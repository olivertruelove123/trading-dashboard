/* === P&L CALENDAR HEATMAP (GitHub-style) === */
function monthlyHeatmapSVG(all){
  const start=new Date(DAYS_ORDER[0]||new Date().toISOString().slice(0,10));
  const end=new Date(DAYS_ORDER[DAYS_ORDER.length-1]||new Date().toISOString().slice(0,10));
  const windowDays=Math.max(60,Math.ceil((end-start)/86400000)+1);
  const pnlByDay={};
  all.forEach(t=>{pnlByDay[t.dayKey]=(pnlByDay[t.dayKey]||0)+(t.pnlDollar||0)});
  const cells=[];
  for(let i=0;i<windowDays;i++){
    const d=new Date(end);d.setDate(d.getDate()-(windowDays-1-i));
    const k=d.toISOString().slice(0,10);
    const v=pnlByDay[k];
    let bg='var(--c-surface-3)';
    if(v!=null){
      if(v>5)bg='#10B981';
      else if(v>0)bg='rgba(16,185,129,.5)';
      else if(v>-5)bg='rgba(239,68,68,.5)';
      else bg='#EF4444';
    }
    cells.push(`<div class="hm-cell" style="background:${bg}" title="${k}: ${v==null?'no trades':fmtSigned(v)}"></div>`);
  }
  return `<div class="heatmap" aria-label="P&L calendar">${cells.join('')}</div><div class="hm-legend"><span>less</span><div class="swatches"><span class="sw" style="background:var(--c-surface-3)"></span><span class="sw" style="background:rgba(239,68,68,.5)"></span><span class="sw" style="background:rgba(16,185,129,.5)"></span><span class="sw" style="background:#10B981"></span></div><span>more</span></div>`;
}

/* === WIN RATE DONUT === */
function winRateDonut(wins,losses,open){
  const tot=wins+losses+open||1;
  const wP=wins/tot,lP=losses/tot,oP=open/tot;
  const C=2*Math.PI*40;
  let offset=0;
  const segs=[{v:wP,c:'var(--c-long)'},{v:lP,c:'var(--c-short)'},{v:oP,c:'var(--c-accent)'}].map(s=>{
    const len=s.v*C;
    const el=`<circle cx="50" cy="50" r="40" fill="none" stroke="${s.c}" stroke-width="14" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 50 50)"/>`;
    offset+=len;return el;
  }).join('');
  const wr=wins+losses?Math.round(wins/(wins+losses)*100):null;
  return `<div class="donut-wrap"><svg width="120" height="120" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--c-border)" stroke-width="14"/>${segs}<text x="50" y="48" text-anchor="middle" fill="var(--c-text)" font-family="var(--f-display)" font-size="18" font-weight="700">${wr==null?'—':wr+'%'}</text><text x="50" y="62" text-anchor="middle" fill="var(--c-text-muted)" font-family="var(--f-mono)" font-size="7" letter-spacing="1">WIN RATE</text></svg><div class="donut-legend"><div class="dl-row"><span class="dl-sw" style="background:var(--c-long)"></span><span class="dl-txt">Wins</span><span class="dl-val">${wins}</span></div><div class="dl-row"><span class="dl-sw" style="background:var(--c-short)"></span><span class="dl-txt">Losses</span><span class="dl-val">${losses}</span></div><div class="dl-row"><span class="dl-sw" style="background:var(--c-accent)"></span><span class="dl-txt">Open</span><span class="dl-val">${open}</span></div></div></div>`;
}

/* === R-MULTIPLE DISTRIBUTION === */
function rMultipleHistogram(all){
  const buckets={'<-2R':0,'-2R':0,'-1R':0,'0R':0,'+1R':0,'+2R':0,'+3R':0,'>+3R':0};
  all.forEach(t=>{
    if(!t.entry||!t.stop||t.currentPrice==null)return;
    const riskPerShare=Math.abs(t.entry-t.stop);if(!riskPerShare)return;
    const mv=(t.direction==='LONG'?t.currentPrice-t.entry:t.entry-t.currentPrice);
    const R=mv/riskPerShare;
    if(R<-2)buckets['<-2R']++;
    else if(R<-1)buckets['-2R']++;
    else if(R<0)buckets['-1R']++;
    else if(R<1)buckets['+1R']++;
    else if(R<2)buckets['+2R']++;
    else if(R<3)buckets['+3R']++;
    else buckets['>+3R']++;
  });
  const max=Math.max(...Object.values(buckets),1);
  const bars=Object.entries(buckets).map(([k,v])=>{
    const pct=v/max*100;
    const neg=k.includes('-')||k==='0R';
    const clr=neg?(k==='0R'?'var(--c-text-muted)':'var(--c-short)'):'var(--c-long)';
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;max-width:40px;height:100px;display:flex;align-items:flex-end;justify-content:center"><div style="width:100%;height:${pct||2}%;background:${clr};border-radius:3px 3px 0 0;transition:height .5s var(--ease);min-height:2px"></div></div><div class="mono mute" style="font-size:9px">${k}</div><div class="mono" style="font-size:10px;color:var(--c-text);font-weight:600">${v}</div></div>`;
  }).join('');
  return `<div style="display:flex;align-items:flex-end;gap:4px;padding:var(--s-3) 0">${bars}</div>`;
}

function rsiSort(k){

function rsiSpark(r){
  // synth RSI path around current value for visual feel
  const base=r.rsiValue;const n=12;
  const pts=[];
  for(let i=0;i<n;i++){
    const v=base+Math.sin(i*0.8+base)*6-((n-i)*0.5);
    pts.push(clamp(v,0,100));
  }
  pts[n-1]=base;
  const w=100,h=24;
  const sx=i=>(i/(n-1))*w;
  const sy=v=>h-((v-20)/60)*h;
  const d=pts.map((p,i)=>(i===0?'M':'L')+sx(i).toFixed(1)+','+sy(p).toFixed(1)).join('');
  const cls=r.signal==='BULLISH'?'long':'short';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path class="chart-line ${cls}" d="${d}"/></svg>`;
}

function ezRadar(r){
  const sigs=r.signals||[];if(!sigs.length)return'<div class="mute mono" style="font-size:var(--t-sm)">No signals</div>';
  const n=Math.min(sigs.length,12);
  const values=sigs.slice(0,n).map(s=>s.score==='BULLISH'?3:s.score==='NEUTRAL'?2:s.score==='CAUTION'?1.2:0.7);
  const cx=100,cy=100,maxR=78;
  const ring=[1,2,3].map(k=>`<circle class="ring" cx="${cx}" cy="${cy}" r="${(k/3)*maxR}"/>`).join('');
  const spokes=values.map((v,i)=>{const a=(i/n)*Math.PI*2-Math.PI/2;const x2=cx+Math.cos(a)*maxR;const y2=cy+Math.sin(a)*maxR;return `<line class="spoke" x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}"/>`}).join('');
  const pts=values.map((v,i)=>{const a=(i/n)*Math.PI*2-Math.PI/2;const rad=(v/3)*maxR;return `${cx+Math.cos(a)*rad},${cy+Math.sin(a)*rad}`}).join(' ');
  return `<svg class="radar" viewBox="0 0 200 200">${ring}${spokes}<polygon class="poly" points="${pts}"/></svg>`;
}

function closePalette(){$('#palette-scrim').classList.remove('open')}
function buildPaletteItems(){
  const items=[];
  // Tickers
  const seen=new Set();
  allTickers().forEach(t=>{if(!seen.has(t.ticker)){seen.add(t.ticker);items.push({g:'Tickers',t:t.ticker,s:`${t.direction} · ${t.verdict} · ${fmtP(t.currentPrice)}`,act:()=>openDrawer(t.ticker)})}});

  (RSI_SCAN_DATA.results||[]).forEach(r=>{if(!seen.has(r.ticker)){seen.add(r.ticker);items.push({g:'Tickers',t:r.ticker,s:`RSI ${r.signal}`,act:()=>openDrawer(r.ticker)})}});
  // Tabs
  NAV_TABS.forEach(t=>items.push({g:'Navigate',t:'Go to '+t.lbl,s:t.desc,act:()=>switchNav(t.id)}));
  // Actions
  items.push({g:'Actions',t:'Position sizer',s:'Calculate size from risk %',act:()=>openSizer()});
  items.push({g:'Actions',t:'New journal entry',s:'Open journal modal',act:()=>openJournal()});
  items.push({g:'Actions',t:'Toggle theme',s:'Terminal / Midnight',act:()=>toggleTheme()});
  items.push({g:'Actions',t:'Cycle density',s:'Compact / Comfortable / Spacious',act:()=>cycleDensity()});
  items.push({g:'Actions',t:'Toggle sidebar',s:'Collapse / expand',act:()=>toggleSidebar()});
  items.push({g:'Actions',t:'Keyboard shortcuts',s:'Show all shortcuts',act:()=>openHelp()});
  items.push({g:'Actions',t:'Export trades CSV',s:'Download trade table',act:()=>exportTradesCSV()});
  items.push({g:'Actions',t:'Export journal markdown',s:'Download journal as .md',act:()=>exportJournalMD()});
  items.push({g:'Actions',t:'Print dashboard',s:'Opens browser print dialog (save as PDF)',act:()=>window.print()});
  paletteItems=items;
  renderPalette();
}
function fuzzy(q,t){
  q=q.toLowerCase();t=t.toLowerCase();
  let qi=0,score=0,last=-1;
  for(let i=0;i<t.length&&qi<q.length;i++){
    if(t[i]===q[qi]){score+=(last+1===i?3:1);last=i;qi++}
  }
  return qi===q.length?score:-1;
}
function renderPalette(){
  const q=paletteQuery.trim();
  let items=paletteItems;
  if(q){
    items=items.map(it=>{const sc=Math.max(fuzzy(q,it.t),fuzzy(q,it.s||''));return {...it,_s:sc}}).filter(it=>it._s>=0).sort((a,b)=>b._s-a._s).slice(0,30);
  }
  paletteItems._filtered=items;
  const groups={};items.forEach(it=>{(groups[it.g]=groups[it.g]||[]).push(it)});
  const html=Object.entries(groups).map(([g,its])=>`<div class="pl-group">${g}</div>${its.map((it,i)=>{
    const idx=items.indexOf(it);const hl=idx===paletteIndex?' hl':'';
    return `<div class="pl-item${hl}" onclick="runPaletteItem(${idx})"><div class="pl-icn">${g==='Tickers'?'$':g==='Navigate'?'↗':'▸'}</div><div class="pl-txt"><div class="pl-t">${esc(it.t)}</div><div class="pl-s">${esc(it.s||'')}</div></div></div>`;
  }).join('')}`).join('')||`<div class="empty" style="padding:var(--s-5)"><div class="title">No matches</div></div>`;
  $('#palette-list').innerHTML=html;
  const hl=$('#palette-list .pl-item.hl');if(hl)hl.scrollIntoView({block:'nearest'});
}
function runPaletteItem(idx){
  const items=paletteItems._filtered||paletteItems;
  const it=items[idx];if(!it)return;
  closePalette();it.act();
}
function paletteKey(e){
  if(e.key==='ArrowDown'){e.preventDefault();const len=(paletteItems._filtered||paletteItems).length;paletteIndex=Math.min(paletteIndex+1,len-1);renderPalette()}
  else if(e.key==='ArrowUp'){e.preventDefault();paletteIndex=Math.max(paletteIndex-1,0);renderPalette()}
  else if(e.key==='Enter'){e.preventDefault();runPaletteItem(paletteIndex)}
  else if(e.key==='Escape'){closePalette()}
}

function recalcSizer(){
  const acct=parseFloat($('#sz-acct').value)||0;
  const risk=parseFloat($('#sz-risk').value)||0;
  const entry=parseFloat($('#sz-entry').value)||0;
  const stop=parseFloat($('#sz-stop').value)||0;

  const perShare=Math.abs(entry-stop);
  if(!perShare||!entry){$('#sz-out').innerHTML='<span class="mute">Enter entry and stop to calculate</span>';return}
  const shares=Math.floor(dollarRisk/perShare);
  const notional=shares*entry;
  const r1=entry+(entry>stop?1:-1)*perShare;
  const r2=entry+(entry>stop?2:-2)*perShare;
  const r3=entry+(entry>stop?3:-3)*perShare;
  $('#sz-out').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--s-3)">
    <div><div class="mute" style="font-size:var(--t-xs);text-transform:uppercase;letter-spacing:.08em">Shares</div><div style="font-size:var(--t-2xl);font-weight:700;color:var(--c-accent-hi)">${shares.toLocaleString()}</div></div>

    <div><div class="mute" style="font-size:var(--t-xs);text-transform:uppercase;letter-spacing:.08em">Risk / share</div><div style="font-size:var(--t-lg);font-weight:600">${fmtP(perShare)}</div></div>
  </div>
  <div style="margin-top:var(--s-3);padding-top:var(--s-3);border-top:1px solid var(--c-border);display:flex;justify-content:space-between"><span class="mute">+1R</span><span class="long" style="font-weight:600">${fmtP(r1)}</span></div>
  <div style="display:flex;justify-content:space-between"><span class="mute">+2R</span><span class="long" style="font-weight:600">${fmtP(r2)}</span></div>
  <div style="display:flex;justify-content:space-between"><span class="mute">+3R</span><span class="long" style="font-weight:600">${fmtP(r3)}</span></div>`;
}

    <div class="field"><label>Emotion tags</label><div style="display:flex;gap:6px;flex-wrap:wrap" id="j-emo">${['confident','patient','fomo','revenge','anxious','disciplined'].map(e=>`<button type="button" class="chip" onclick="this.classList.toggle('active')" data-emo="${e}">${e}</button>`).join('')}</div></div>`;
  $('#journal-scrim').classList.add('open');
  setTimeout(()=>$('#j-ticker').focus(),20);
}
function closeJournal(){$('#journal-scrim').classList.remove('open')}
function saveJournal(){
  const entry={
    id:Date.now().toString(36),
    ticker:($('#j-ticker').value||'').toUpperCase().trim(),
    date:$('#j-date').value,
    pnl:$('#j-pnl').value?parseFloat($('#j-pnl').value):null,
    note:$('#j-note').value.trim(),
    tags:$('#j-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    emotions:Array.from(document.querySelectorAll('#j-emo .chip.active')).map(b=>b.dataset.emo)
  };
  if(!entry.ticker||!entry.note){toast('Ticker and note required','error');return}
  const list=loadJournal();list.push(entry);keySave('oliver_journal',list);
  toast('Journal entry saved','success');closeJournal();
  renderSideNav();if(currentNavTab==='journal')renderJournal();
}
function deleteJournalEntry(id){
  if(!confirm('Delete this entry?'))return;
  const list=loadJournal().filter(e=>e.id!==id);keySave('oliver_journal',list);
  renderSideNav();renderJournal();toast('Entry deleted','success');
}

/* === HELP / SHORTCUTS === */
function openHelp(){
  const shortcuts=[
    ['⌘K / Ctrl+K','Command palette'],
    ['G then S','Setups'],['G then P','Performance'],['G then R','RSI scan'],
    ['G then W','Week review'],['G then E','EZPZ deep'],['G then C','Correlation'],['G then J','Journal'],['G then B','Playbook'],
    ['N','New journal entry'],['S','Position sizer'],['T','Toggle theme'],['D','Cycle density'],
    ['B','Toggle sidebar'],['?','This help'],['ESC','Close overlay']
  ];
  $('#help-body').innerHTML=`<div class="kbd-grid">${shortcuts.map(([k,d])=>`<div class="kbd-row"><span class="kd">${d}</span><span class="ks">${k.split(/\s+/).map(p=>`<span class="kbd">${esc(p)}</span>`).join(' ')}</span></div>`).join('')}</div>`;
  $('#help-scrim').classList.add('open');
}
function closeHelp(){$('#help-scrim').classList.remove('open')}

/* === TOAST === */
function toast(msg,type='info',ttl=3000){
  const host=$('#toast-host');
  const el=document.createElement('div');
  el.className='toast '+type;
  el.innerHTML=`<span class="toast-txt">${esc(msg)}</span>`;
  host.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity 200ms var(--ease)';setTimeout(()=>el.remove(),220)},ttl);
}

/* === THEME / DENSITY / SIDEBAR === */
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'terminal';
  const next=cur==='terminal'?'midnight':'terminal';
  document.documentElement.setAttribute('data-theme',next);
  keySave('oliver_theme',next);toast('Theme: '+next,'info',1500);
}
function cycleDensity(){
  const order=['compact','comfortable','spacious'];
  const cur=document.documentElement.getAttribute('data-density')||'comfortable';
  const next=order[(order.indexOf(cur)+1)%order.length];
  document.documentElement.setAttribute('data-density',next);
  keySave('oliver_density',next);toast('Density: '+next,'info',1500);
}
function toggleSidebar(){
  const app=$('#app');
  const collapsed=app.classList.toggle('sidebar-collapsed');
  keySave('oliver_sidebar_collapsed',collapsed);
}

/* === EXPORTS === */
function exportTradesCSV(){
  const all=allTickers();
  const rows=[['Date','Ticker','Direction','Verdict','Entry','Stop','Target','Current','PnL$','PnL%','Status','RR','Conviction']];
  all.forEach(t=>rows.push([t.dayKey,t.ticker,t.direction,t.verdict,t.entry,t.stop,t.target,t.currentPrice,t.pnlDollar,t.pnlPct,t.status,t.rrRatio,t.conviction]));
  const csv=rows.map(r=>r.map(c=>c==null?'':/[,"\n]/.test(String(c))?`"${String(c).replace(/"/g,'""')}"`:c).join(',')).join('\n');
  download('trades_'+new Date().toISOString().slice(0,10)+'.csv',csv,'text/csv');
  toast('Trades exported','success');
}
function exportJournalMD(){
  const list=loadJournal();
  if(!list.length){toast('No entries to export','error');return}
  let md='# Trade Journal\n\n';
  list.forEach(e=>{
    md+=`## ${e.ticker||'—'} — ${e.date||''}\n\n`;
    if(e.pnl!=null)md+=`**P&L:** ${fmtSigned(e.pnl)}\n\n`;
    if(e.tags&&e.tags.length)md+=`**Setup:** ${e.tags.join(', ')}\n\n`;
    if(e.emotions&&e.emotions.length)md+=`**Emotions:** ${e.emotions.join(', ')}\n\n`;
    md+=e.note+'\n\n---\n\n';
  });
  download('journal_'+new Date().toISOString().slice(0,10)+'.md',md,'text/markdown');
  toast('Journal exported','success');
}
function download(name,data,mime){
  const blob=new Blob([data],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),500);
}

/* === NAV / SWITCH === */
function switchNav(id){
  currentNavTab=id;
  keySave('oliver_nav',id);
  $$('.panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+id));
  renderSideNav();
  const tab=NAV_TABS.find(t=>t.id===id);
  if(tab){$('#ws-title').textContent=tab.lbl;$('#ws-sub').textContent=tab.desc}
  if(id==='setups')renderSetups();
  else if(id==='perf')renderPerf();
  else if(id==='signals')renderSignals();
  else if(id==='rsiscan')renderRsiScan();
  else if(id==='week')renderWeek();
  else if(id==='ezpz')renderEzpz();
  else if(id==='corr')renderCorrelation();
  else if(id==='journal')renderJournal();
  else if(id==='playbook')renderPlaybook();
  // Workspace actions
  const ws=$('#ws-actions');
  if(id==='setups'){ws.innerHTML=`<button class="btn small" onclick="renderSetups()">Refresh</button>`}
  else if(id==='perf'){ws.innerHTML=`<button class="btn small" onclick="exportTradesCSV()">Export CSV</button><button class="btn small" onclick="window.print()">Print</button>`}
  else if(id==='journal'){ws.innerHTML=`<button class="btn small primary" onclick="openJournal()">+ New Entry</button>`}
  else if(id==='corr'){ws.innerHTML=`<button class="btn small" onclick="renderCorrelation({force:true})">Refresh</button>`}
  else if(id==='playbook'){ws.innerHTML=`<button class="btn small" onclick="pbExpandAll()">Expand all</button><button class="btn small ghost" onclick="pbCollapseAll()">Collapse all</button>`}
  else ws.innerHTML='';
}
function switchDay(k){
  currentDayKey=k;
  keySave('oliver_day',k);
  if(currentNavTab==='setups')renderSetups();
  else if(currentNavTab==='signals')renderSignals();
}

/* === KEYBOARD SHORTCUTS === */
let gPrefix=false,gTimer=null;
function keydown(e){
  const paletteOpen=$('#palette-scrim').classList.contains('open');
  if(paletteOpen){paletteKey(e);return}
  // Close any modal on ESC
  if(e.key==='Escape'){
    closeDrawer();closeSizer();closeJournal();closeHelp();
    return;
  }
  // Ignore when typing in inputs
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;
  // Cmd/Ctrl+K
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openPalette();return}
  // g-prefix
  if(gPrefix){
    const map={s:'setups',p:'perf',r:'rsiscan',w:'week',e:'ezpz',j:'journal',b:'playbook',f:'signals',c:'corr'};
    if(map[e.key]){switchNav(map[e.key]);gPrefix=false;clearTimeout(gTimer);return}
    gPrefix=false;clearTimeout(gTimer);
  }
  if(e.key==='g'){gPrefix=true;gTimer=setTimeout(()=>gPrefix=false,1000);return}
  if(e.key==='?'){openHelp();return}
  if(e.key==='n'||e.key==='N'){openJournal();return}
  if(e.key==='s'&&!e.shiftKey){openSizer();return}
  if(e.key==='t'){toggleTheme();return}
  if(e.key==='d'){cycleDensity();return}
  if(e.key==='b'){toggleSidebar();return}
}

/* === INIT === */
function init(){
  // Restore persisted prefs
  const theme=keyStore('oliver_theme');if(theme)document.documentElement.setAttribute('data-theme',theme);
  const density=keyStore('oliver_density');if(density)document.documentElement.setAttribute('data-density',density);
  if(keyStore('oliver_sidebar_collapsed'))$('#app').classList.add('sidebar-collapsed');
  const savedDay=localStorage.getItem('oliver_day');
  if(savedDay){try{const d=JSON.parse(savedDay);if(d&&ALL_DAYS_DATA.days[d])currentDayKey=d}catch(e){if(ALL_DAYS_DATA.days[savedDay])currentDayKey=savedDay}}
  const savedNav=localStorage.getItem('oliver_nav');
  if(savedNav){try{const n=JSON.parse(savedNav);if(n&&NAV_TABS.find(t=>t.id===n))currentNavTab=n}catch(e){if(NAV_TABS.find(t=>t.id===savedNav))currentNavTab=savedNav}}
  renderSideNav();renderMiniWatchlist();
  switchNav(currentNavTab);
  updateClock();renderSessions();renderBreadth();
  setInterval(updateClock,1000);
  setInterval(renderSessions,30000);
  // Live quote feed — kick immediately, then refresh every LIVE_REFRESH_MS
  refreshLiveQuotes();
  setInterval(refreshLiveQuotes,LIVE_REFRESH_MS);
  // Keep breadth redrawing during the loading grace window so the feed pill animates
  setInterval(()=>{if(liveFeedStatus!=='live')renderBreadth()},5000);
  // Palette input handler
  $('#palette-input').addEventListener('input',e=>{paletteQuery=e.target.value;paletteIndex=0;renderPalette()});
  // Global keyboard
  document.addEventListener('keydown',keydown);
  // Expose for debugging
  window._td={switchNav,switchDay,openDrawer,openPalette,toast};
}
document.addEventListener('DOMContentLoaded',init);
</script>
