<!DOCTYPE html>
<html lang="en" data-theme="terminal" data-density="comfortable">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oliver's Trading Terminal</title>
<meta name="description" content="Personal trading terminal — setups, performance, signals, EZPZ flow, RSI scans.">
<meta property="og:title" content="Oliver's Trading Terminal">
<meta property="og:description" content="EZPZ signals, Trinity Cipher setups, performance analytics.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A1628'/%3E%3Cpath d='M6 22 L12 14 L18 18 L26 8' stroke='%233B82F6' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='26' cy='8' r='2.5' fill='%2310B981'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* === DESIGN TOKENS === */
:root{
  --c-bg:#0A1628;--c-surface-1:#0F1E35;--c-surface-2:#162A44;--c-surface-3:#1E3555;
  --c-border:#1E2F4A;--c-border-emphasis:#2A4266;
  --c-text:#E8EEF7;--c-text-secondary:#9AAAC4;--c-text-muted:#6B7A94;
  --c-accent:#3B82F6;--c-accent-hi:#60A5FA;--c-accent-lo:rgba(59,130,246,.12);
  --c-long:#10B981;--c-long-lo:rgba(16,185,129,.12);--c-long-hi:rgba(16,185,129,.32);
  --c-short:#EF4444;--c-short-lo:rgba(239,68,68,.12);--c-short-hi:rgba(239,68,68,.32);
  --c-warn:#F59E0B;--c-warn-lo:rgba(245,158,11,.12);
  --c-conviction:#FBBF24;--c-conviction-glow:rgba(251,191,36,.35);
  --c-grid:rgba(30,47,74,.4);
  --s-1:4px;--s-2:8px;--s-3:12px;--s-4:16px;--s-5:24px;--s-6:32px;--s-7:48px;--s-8:64px;
  --f-ui:'Inter',system-ui,-apple-system,sans-serif;
  --f-mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --f-display:'Space Grotesk','Inter',sans-serif;
  --t-xs:10px;--t-sm:11px;--t-base:12px;--t-md:13px;--t-lg:15px;--t-xl:18px;--t-2xl:24px;--t-3xl:32px;--t-4xl:44px;
  --r-xs:4px;--r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-full:999px;
  --shadow-1:0 1px 2px rgba(6,14,30,.5),0 1px 1px rgba(6,14,30,.3);
  --shadow-2:0 6px 14px rgba(6,14,30,.55),0 2px 4px rgba(6,14,30,.35);
  --shadow-3:0 18px 36px rgba(6,14,30,.6),0 8px 14px rgba(6,14,30,.4);
  --shadow-glow-accent:0 0 24px rgba(59,130,246,.35);
  --shadow-glow-long:0 0 20px rgba(16,185,129,.25);
  --shadow-glow-short:0 0 20px rgba(239,68,68,.25);
  --ease:cubic-bezier(.4,0,.2,1);--dur-fast:120ms;--dur:200ms;--dur-slow:400ms;
  --w-sidebar:240px;--w-sidebar-collapsed:64px;--w-drawer:380px;
  --h-breadth:28px;--h-cmdbar:56px;
  --z-bar:40;--z-bar-hi:55;--z-drawer:60;--z-modal:70;--z-palette:80;--z-toast:90;
}
/* Theme: midnight (warmer, less blue) */
html[data-theme="midnight"]{
  --c-bg:#0D0E16;--c-surface-1:#151721;--c-surface-2:#1C1F2B;--c-surface-3:#262A3A;
  --c-border:#272A3A;--c-border-emphasis:#363A50;--c-grid:rgba(60,60,80,.4);
  --c-accent:#818CF8;--c-accent-hi:#A5B4FC;--c-accent-lo:rgba(129,140,248,.12);
}
/* Density */
html[data-density="compact"]{--s-3:8px;--s-4:12px;--s-5:18px;--s-6:24px;--t-base:11px;--t-md:12px;--t-lg:14px;--h-cmdbar:48px;}
html[data-density="spacious"]{--s-3:16px;--s-4:22px;--s-5:32px;--s-6:44px;--t-base:13px;--t-md:14px;--t-lg:16px;--h-cmdbar:64px;}

/* === RESET === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--f-ui);font-weight:400;font-size:var(--t-md);color:var(--c-text);background:var(--c-bg);min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-0.005em}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(59,130,246,.06),transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(16,185,129,.03),transparent 70%);pointer-events:none;z-index:0}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
button:focus-visible,[tabindex]:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--c-accent);outline-offset:2px;border-radius:var(--r-xs)}
input,select,textarea{font:inherit;color:inherit;background:none;border:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:var(--r-full);border:2px solid var(--c-bg)}
::-webkit-scrollbar-thumb:hover{background:var(--c-border-emphasis)}
::selection{background:var(--c-accent-lo);color:var(--c-text)}

/* === MONO UTILS === */
.mono{font-family:var(--f-mono);font-variant-numeric:tabular-nums}
.display{font-family:var(--f-display);letter-spacing:-0.02em}
.mute{color:var(--c-text-muted)}.sec{color:var(--c-text-secondary)}
.long{color:var(--c-long)}.short{color:var(--c-short)}.warn{color:var(--c-warn)}

/* === APP SHELL === */
.app{position:relative;z-index:1;display:grid;grid-template-columns:var(--w-sidebar) 1fr;grid-template-rows:var(--h-breadth) var(--h-cmdbar) 1fr;grid-template-areas:"breadth breadth" "cmdbar cmdbar" "sidebar workspace";height:100vh;transition:grid-template-columns var(--dur) var(--ease)}
.app.sidebar-collapsed{grid-template-columns:var(--w-sidebar-collapsed) 1fr}
.app.drawer-open{grid-template-columns:var(--w-sidebar) 1fr var(--w-drawer);grid-template-areas:"breadth breadth breadth" "cmdbar cmdbar cmdbar" "sidebar workspace drawer"}
.app.sidebar-collapsed.drawer-open{grid-template-columns:var(--w-sidebar-collapsed) 1fr var(--w-drawer)}

/* === BREADTH BAR === */
.breadth{grid-area:breadth;display:flex;align-items:center;gap:var(--s-4);padding:0 var(--s-4);background:var(--c-surface-1);border-bottom:1px solid var(--c-border);font-family:var(--f-mono);font-size:var(--t-xs);overflow-x:auto;scrollbar-width:none}
.breadth::-webkit-scrollbar{display:none}
.breadth .br-lbl{color:var(--c-text-muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.breadth .br-item{display:flex;align-items:center;gap:6px;white-space:nowrap}
.breadth .br-sym{color:var(--c-text-secondary);font-weight:600}
.breadth .br-px{color:var(--c-text);font-weight:600;font-variant-numeric:tabular-nums}
.breadth .br-ch{font-weight:500;font-variant-numeric:tabular-nums}
.stale-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--c-text-muted);margin-right:6px;opacity:.55;vertical-align:middle}
.feed-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle;background:var(--c-text-muted);transition:background var(--dur) var(--ease)}
.feed-live .feed-dot{background:var(--c-long);box-shadow:0 0 6px var(--c-long)}
.feed-stale .feed-dot{background:var(--c-warn)}
.feed-loading .feed-dot{background:var(--c-accent);animation:feedPulse 1.2s ease-in-out infinite}
.feed-live{color:var(--c-long)!important}
.feed-stale{color:var(--c-warn)!important}
@keyframes feedPulse{0%,100%{opacity:.4}50%{opacity:1}}
.drawer-live-card .val{font-size:var(--t-md)}
.corr-wrap{overflow:auto;max-width:100%;border:1px solid var(--c-border);border-radius:var(--r-md);background:var(--c-surface-1)}
.corr-grid{border-collapse:separate;border-spacing:0;font-family:var(--f-mono);font-size:11px;margin:0}
.corr-grid th,.corr-grid td{padding:3px 6px;text-align:center;white-space:nowrap;min-width:44px;height:24px;box-sizing:border-box}
.corr-grid thead th{position:sticky;top:0;background:var(--c-surface-2);color:var(--c-text-secondary);font-weight:600;font-size:10px;letter-spacing:.04em;z-index:2;border-bottom:1px solid var(--c-border)}
.corr-grid thead th.corner{left:0;z-index:3}
.corr-grid tbody th{position:sticky;left:0;background:var(--c-surface-2);color:var(--c-text-secondary);font-weight:600;text-align:right;z-index:1;border-right:1px solid var(--c-border);font-size:10px;letter-spacing:.04em;padding-right:8px}
.corr-grid tbody td{color:rgba(255,255,255,.92);font-variant-numeric:tabular-nums;font-weight:500;cursor:default}
.corr-grid tbody td.diag{background:var(--c-surface-3);color:var(--c-text-muted)}
.corr-grid tbody td.na{background:transparent;color:var(--c-text-muted)}
.corr-legend{display:flex;align-items:center;gap:var(--s-2);font-size:var(--t-xs);color:var(--c-text-muted);margin-top:var(--s-3)}
.corr-legend .bar{flex:0 0 180px;height:10px;border-radius:var(--r-xs);background:linear-gradient(90deg,rgba(239,68,68,.75),rgba(239,68,68,0) 50%,rgba(16,185,129,0) 50%,rgba(16,185,129,.75))}
.corr-meta{display:flex;gap:var(--s-4);flex-wrap:wrap;margin-bottom:var(--s-3);font-size:var(--t-sm);color:var(--c-text-secondary)}
.corr-meta .pill{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-sm);padding:4px 10px;font-family:var(--f-mono);font-size:var(--t-xs)}
.br-up{color:var(--c-long)}.br-dn{color:var(--c-short)}

/* === COMMAND BAR === */
.cmdbar{grid-area:cmdbar;display:flex;align-items:center;gap:var(--s-4);padding:0 var(--s-4);background:rgba(10,22,40,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--c-border);z-index:var(--z-bar-hi);position:relative}
.logo{display:flex;align-items:center;gap:var(--s-2);font-family:var(--f-display);font-weight:700;font-size:var(--t-md);letter-spacing:-.02em;color:var(--c-text);flex-shrink:0;padding-right:var(--s-3);border-right:1px solid var(--c-border)}
.logo svg{flex-shrink:0}
.logo .dot{width:6px;height:6px;border-radius:50%;background:var(--c-long);box-shadow:0 0 8px var(--c-long);animation:pulse 2s var(--ease) infinite}
.cmd-search{flex:1;max-width:480px;display:flex;align-items:center;gap:var(--s-2);background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:var(--r-md);padding:0 var(--s-3);height:36px;cursor:pointer;transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease)}
.cmd-search:hover{border-color:var(--c-border-emphasis);background:var(--c-surface-2)}
.cmd-search .icn{color:var(--c-text-muted);font-size:14px}
.cmd-search .txt{flex:1;color:var(--c-text-muted);font-size:var(--t-md)}
.cmd-search .kbd{display:flex;gap:2px}
.kbd{font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-muted);background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-xs);padding:2px 6px;font-weight:600;min-width:22px;text-align:center;line-height:1}
.cmd-center{display:flex;align-items:center;gap:var(--s-3);margin-left:auto;font-family:var(--f-mono);font-size:var(--t-sm)}
.sess-pills{display:flex;gap:6px}
.sess-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:var(--r-sm);background:var(--c-surface-1);border:1px solid var(--c-border);color:var(--c-text-muted);font-size:var(--t-xs);font-weight:600;letter-spacing:.06em}
.sess-pill .sd{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5}
.sess-pill.open{color:var(--c-long)}.sess-pill.open .sd{opacity:1;box-shadow:0 0 6px var(--c-long)}
.sess-pill.pre{color:var(--c-warn)}.sess-pill.pre .sd{opacity:1}
.sess-pill.closed{color:var(--c-text-muted)}
.cmd-clock{color:var(--c-text);font-weight:600;font-variant-numeric:tabular-nums}
.cmd-right{display:flex;align-items:center;gap:var(--s-2);flex-shrink:0}
.icon-btn{width:36px;height:36px;display:grid;place-items:center;color:var(--c-text-muted);border-radius:var(--r-md);transition:background var(--dur) var(--ease),color var(--dur) var(--ease);font-size:14px;flex-shrink:0}
.icon-btn:hover{background:var(--c-surface-2);color:var(--c-text)}
.icon-btn.active{background:var(--c-accent-lo);color:var(--c-accent)}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--c-long);box-shadow:0 0 8px rgba(16,185,129,.6);position:relative}
.feed-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid var(--c-long);animation:pulseRing 2s var(--ease) infinite;opacity:.5}

/* === SIDEBAR === */
.sidebar{grid-area:sidebar;background:var(--c-surface-1);border-right:1px solid var(--c-border);display:flex;flex-direction:column;overflow:hidden}
.side-nav{flex:1;display:flex;flex-direction:column;padding:var(--s-3);gap:2px;overflow-y:auto}
.side-item{display:flex;align-items:center;gap:var(--s-3);padding:10px var(--s-3);border-radius:var(--r-md);color:var(--c-text-secondary);font-size:var(--t-md);font-weight:500;cursor:pointer;transition:background var(--dur) var(--ease),color var(--dur) var(--ease);position:relative;white-space:nowrap;overflow:hidden}
.side-item:hover{background:var(--c-surface-2);color:var(--c-text)}
.side-item.active{background:var(--c-accent-lo);color:var(--c-accent-hi);font-weight:600}
.side-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--c-accent);border-radius:0 2px 2px 0}
.side-item .icn{width:18px;height:18px;display:grid;place-items:center;flex-shrink:0;font-size:14px}
.side-item .lbl{flex:1}
.side-item .badge{background:var(--c-surface-3);color:var(--c-text-secondary);font-family:var(--f-mono);font-size:var(--t-xs);padding:2px 6px;border-radius:var(--r-full);font-weight:600}
.side-item.active .badge{background:var(--c-accent);color:#fff}
.app.sidebar-collapsed .side-item .lbl,
.app.sidebar-collapsed .side-item .badge,
.app.sidebar-collapsed .side-hdr-txt,
.app.sidebar-collapsed .mw-list,
.app.sidebar-collapsed .mw-title{display:none}
.app.sidebar-collapsed .side-item{justify-content:center;padding:10px 0}
.side-hdr{padding:var(--s-3) var(--s-4) var(--s-1);font-family:var(--f-display);font-size:var(--t-xs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-text-muted)}
.side-foot{border-top:1px solid var(--c-border);padding:var(--s-3)}
.mw-title{font-family:var(--f-display);font-size:var(--t-xs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-text-muted);margin-bottom:var(--s-2)}
.mw-list{display:flex;flex-direction:column;gap:2px}
.mw-row{display:flex;align-items:center;gap:var(--s-2);padding:6px var(--s-2);border-radius:var(--r-sm);cursor:pointer;transition:background var(--dur) var(--ease)}
.mw-row:hover{background:var(--c-surface-2)}
.mw-sym{font-family:var(--f-display);font-weight:600;font-size:var(--t-sm);color:var(--c-text);flex:1}
.mw-px{font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-secondary);font-variant-numeric:tabular-nums}
.mw-ch{font-family:var(--f-mono);font-size:var(--t-xs);font-weight:600;font-variant-numeric:tabular-nums;min-width:50px;text-align:right}

/* === WORKSPACE === */
.workspace{grid-area:workspace;overflow:hidden;display:flex;flex-direction:column}
.ws-header{display:flex;align-items:center;justify-content:space-between;padding:var(--s-4) var(--s-5);gap:var(--s-4);flex-wrap:wrap;border-bottom:1px solid var(--c-border);background:var(--c-bg)}
.ws-title{font-family:var(--f-display);font-weight:700;font-size:var(--t-xl);letter-spacing:-.02em;color:var(--c-text)}
.ws-sub{font-family:var(--f-mono);font-size:var(--t-sm);color:var(--c-text-muted);margin-top:2px}
.ws-actions{display:flex;gap:var(--s-2);align-items:center;flex-wrap:wrap}
.ws-body{flex:1;overflow-y:auto;padding:var(--s-5);scroll-behavior:smooth}
.panel{display:none;animation:panelIn var(--dur-slow) var(--ease)}
.panel.active{display:block}

/* === DATE STRIP === */
.date-strip{display:flex;gap:var(--s-2);overflow-x:auto;padding-bottom:var(--s-3);scrollbar-width:none}
.date-strip::-webkit-scrollbar{display:none}
.date-tab{padding:var(--s-2) var(--s-4);background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:var(--r-md);font-family:var(--f-mono);font-size:var(--t-sm);font-weight:600;color:var(--c-text-secondary);cursor:pointer;transition:all var(--dur) var(--ease);display:flex;flex-direction:column;align-items:center;gap:2px;white-space:nowrap;min-width:90px}
.date-tab:hover{background:var(--c-surface-2);color:var(--c-text);transform:translateY(-1px);box-shadow:var(--shadow-1)}
.date-tab.active{background:var(--c-accent-lo);border-color:var(--c-accent);color:var(--c-accent-hi)}
.date-tab .dd{width:4px;height:4px;border-radius:50%;background:var(--c-long);box-shadow:0 0 6px var(--c-long)}

/* === STATS ROW === */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:var(--s-3);margin-bottom:var(--s-5)}
.stat{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:var(--s-4);transition:border-color var(--dur) var(--ease),transform var(--dur) var(--ease)}
.stat:hover{border-color:var(--c-border-emphasis);transform:translateY(-1px)}
.stat .lbl{font-family:var(--f-display);font-size:var(--t-xs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-text-muted);margin-bottom:var(--s-2)}
.stat .val{font-family:var(--f-mono);font-size:var(--t-2xl);font-weight:700;color:var(--c-text);line-height:1;font-variant-numeric:tabular-nums}
.stat .sub{font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-muted);margin-top:var(--s-2)}
.stat.long .val{color:var(--c-long)}.stat.short .val{color:var(--c-short)}
.stat.warn .val{color:var(--c-warn)}.stat.accent .val{color:var(--c-accent-hi)}

/* === KANBAN === */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--s-3);min-height:420px}
@media(max-width:1400px){.kanban{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.kanban{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.kanban{grid-template-columns:1fr}}
.k-col{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:var(--r-lg);display:flex;flex-direction:column;min-height:300px}
.k-hdr{display:flex;align-items:center;justify-content:space-between;padding:var(--s-3) var(--s-4);border-bottom:1px solid var(--c-border);font-family:var(--f-display);font-size:var(--t-sm);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--c-text-secondary)}
.k-cnt{background:var(--c-surface-3);color:var(--c-text);font-family:var(--f-mono);font-size:var(--t-xs);font-weight:600;padding:2px 8px;border-radius:var(--r-full);min-width:24px;text-align:center}
.k-body{padding:var(--s-3);display:flex;flex-direction:column;gap:var(--s-3);flex:1;overflow-y:auto;max-height:calc(100vh - 340px)}
.k-empty{padding:var(--s-5) var(--s-3);text-align:center;color:var(--c-text-muted);font-size:var(--t-sm);font-family:var(--f-mono)}

/* === TICKER CARD === */
.tcard{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:transform var(--dur) var(--ease),box-shadow var(--dur) var(--ease),border-color var(--dur) var(--ease);position:relative}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-2);border-color:var(--c-border-emphasis)}
.tcard.dir-long{border-left:3px solid var(--c-long)}
.tcard.dir-short{border-left:3px solid var(--c-short)}
.tcard.v-strong::after{content:'';position:absolute;top:0;right:0;width:6px;height:6px;border-radius:50%;background:var(--c-conviction);margin:var(--s-3);box-shadow:0 0 10px var(--c-conviction-glow)}
.tc-head{display:flex;align-items:baseline;justify-content:space-between;padding:var(--s-3) var(--s-3) var(--s-2);gap:var(--s-2)}
.tc-sym{font-family:var(--f-display);font-weight:700;font-size:var(--t-xl);letter-spacing:-.02em;color:var(--c-text)}
.tc-dir{font-family:var(--f-mono);font-size:var(--t-xs);font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:var(--r-xs)}
.tc-dir.long{background:var(--c-long-lo);color:var(--c-long);border:1px solid var(--c-long-hi)}
.tc-dir.short{background:var(--c-short-lo);color:var(--c-short);border:1px solid var(--c-short-hi)}
.tc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--s-2);padding:0 var(--s-3) var(--s-3)}
.tc-cell .lbl{font-family:var(--f-display);font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--c-text-muted);margin-bottom:2px}
.tc-cell .val{font-family:var(--f-mono);font-size:var(--t-md);font-weight:600;color:var(--c-text);font-variant-numeric:tabular-nums}
.tc-cell .val.stop{color:var(--c-short)}.tc-cell .val.tgt{color:var(--c-long)}
.tc-live{display:flex;align-items:center;justify-content:space-between;padding:var(--s-2) var(--s-3);background:var(--c-surface-3);border-top:1px solid var(--c-border);gap:var(--s-2)}
.tc-live .px{font-family:var(--f-mono);font-weight:600;font-size:var(--t-md);color:var(--c-text);font-variant-numeric:tabular-nums}
.tc-live .ch{font-family:var(--f-mono);font-size:var(--t-xs);font-weight:600;font-variant-numeric:tabular-nums}
.tc-status{font-family:var(--f-mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--r-xs);letter-spacing:.04em}
.st-open{background:var(--c-accent-lo);color:var(--c-accent-hi);border:1px solid rgba(59,130,246,.3)}
.st-play{background:var(--c-warn-lo);color:var(--c-warn);border:1px solid rgba(245,158,11,.3)}
.st-hit{background:var(--c-long-lo);color:var(--c-long);border:1px solid var(--c-long-hi)}
.st-stop{background:var(--c-short-lo);color:var(--c-short);border:1px solid var(--c-short-hi)}
.tc-progress{padding:var(--s-2) var(--s-3) var(--s-3);position:relative}
.tc-track{height:4px;background:var(--c-border);border-radius:var(--r-full);position:relative;overflow:hidden}
.tc-fill{position:absolute;top:0;left:0;height:100%;border-radius:var(--r-full);transition:width var(--dur-slow) var(--ease)}
.tc-fill.long{background:linear-gradient(90deg,transparent,var(--c-long))}
.tc-fill.short{background:linear-gradient(90deg,transparent,var(--c-short))}
.tc-pnl{font-family:var(--f-mono);font-size:var(--t-xs);font-weight:600;margin-top:var(--s-2);display:flex;justify-content:space-between;color:var(--c-text-secondary)}
.tc-conv-ring{width:32px;height:32px;position:relative;flex-shrink:0}
.tc-conv-ring svg{transform:rotate(-90deg)}
.tc-conv-ring .track{stroke:var(--c-border);fill:none;stroke-width:3}
.tc-conv-ring .fill{fill:none;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset var(--dur-slow) var(--ease)}
.tc-conv-ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--f-mono);font-size:var(--t-xs);font-weight:700;color:var(--c-text)}

/* === TABLES === */
.tbl-wrap{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:var(--r-lg);overflow:hidden;overflow-x:auto;margin-bottom:var(--s-4)}
.tbl{width:100%;border-collapse:collapse;font-size:var(--t-md)}
.tbl thead{position:sticky;top:0;background:var(--c-surface-1);z-index:5}
.tbl th{font-family:var(--f-display);font-size:var(--t-xs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-text-muted);padding:10px var(--s-3);text-align:left;border-bottom:1px solid var(--c-border);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{color:var(--c-text)}
.tbl th.sortable::after{content:'↕';margin-left:4px;opacity:.4;font-size:10px}
.tbl th.sort-asc::after{content:'↑';opacity:1;color:var(--c-accent)}
.tbl th.sort-desc::after{content:'↓';opacity:1;color:var(--c-accent)}
.tbl td{padding:10px var(--s-3);border-bottom:1px solid var(--c-border);font-family:var(--f-mono);font-variant-numeric:tabular-nums;white-space:nowrap;vertical-align:middle}
.tbl tbody tr{transition:background var(--dur) var(--ease)}
.tbl tbody tr:hover{background:var(--c-surface-2);cursor:pointer}
.tbl tbody tr:last-child td{border-bottom:none}

/* === CARDS & PANELS === */
.card{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:var(--s-4);transition:border-color var(--dur) var(--ease)}
.card:hover{border-color:var(--c-border-emphasis)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s-3);gap:var(--s-2)}
.card-title{font-family:var(--f-display);font-size:var(--t-sm);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--c-text-secondary)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-4)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s-4)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s-4)}
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.grid-3,.grid-2{grid-template-columns:1fr}.grid-4{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.grid-4{grid-template-columns:1fr}}

/* === BADGES & CHIPS === */
.badge{font-family:var(--f-mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--r-xs);letter-spacing:.06em;display:inline-block;white-space:nowrap}
.b-bull{background:var(--c-long-lo);color:var(--c-long);border:1px solid var(--c-long-hi)}
.b-bear{background:var(--c-short-lo);color:var(--c-short);border:1px solid var(--c-short-hi)}
.b-neut{background:var(--c-surface-3);color:var(--c-text-secondary);border:1px solid var(--c-border-emphasis)}
.b-warn{background:var(--c-warn-lo);color:var(--c-warn);border:1px solid rgba(245,158,11,.3)}
.b-accent{background:var(--c-accent-lo);color:var(--c-accent-hi);border:1px solid rgba(59,130,246,.3)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-full);font-family:var(--f-mono);font-size:var(--t-xs);font-weight:600;color:var(--c-text-secondary);cursor:pointer;transition:all var(--dur) var(--ease)}
.chip:hover{background:var(--c-surface-3);color:var(--c-text)}
.chip.active{background:var(--c-accent-lo);color:var(--c-accent-hi);border-color:var(--c-accent)}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--s-2);padding:8px 14px;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-sm);font-family:var(--f-ui);font-size:var(--t-md);font-weight:600;color:var(--c-text-secondary);cursor:pointer;transition:all var(--dur) var(--ease);min-height:36px;white-space:nowrap}
.btn:hover{background:var(--c-surface-3);color:var(--c-text);border-color:var(--c-border-emphasis);transform:translateY(-1px);box-shadow:var(--shadow-1)}
.btn.primary{background:var(--c-accent);color:#fff;border-color:var(--c-accent)}
.btn.primary:hover{background:var(--c-accent-hi);border-color:var(--c-accent-hi)}
.btn.ghost{background:transparent}
.btn.ghost:hover{background:var(--c-surface-2)}
.btn.small{padding:6px 10px;font-size:var(--t-sm);min-height:28px}

/* === CHARTS === */
.chart-wrap{position:relative;width:100%}
svg.chart{width:100%;display:block;overflow:visible}
.chart-tick{fill:var(--c-text-muted);font-family:var(--f-mono);font-size:10px}
.chart-grid{stroke:var(--c-grid);stroke-width:1;stroke-dasharray:2 4}
.chart-axis{stroke:var(--c-border-emphasis);stroke-width:1}
.chart-line{fill:none;stroke:var(--c-accent);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.chart-line.long{stroke:var(--c-long)}
.chart-line.short{stroke:var(--c-short)}
.chart-area{fill:url(#areaGrad)}
.chart-point{fill:var(--c-accent)}

/* === HEATMAP (monthly returns / P&L calendar) === */
.heatmap{display:grid;gap:3px;grid-template-columns:repeat(auto-fill,minmax(14px,1fr));padding:var(--s-3) 0}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--c-surface-3);transition:transform var(--dur-fast) var(--ease)}
.hm-cell:hover{transform:scale(1.4);box-shadow:var(--shadow-1);z-index:2;position:relative}
.hm-legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-muted)}
.hm-legend .swatches{display:flex;gap:2px}
.hm-legend .sw{width:12px;height:12px;border-radius:2px}

/* === DONUT === */
.donut-wrap{display:flex;align-items:center;gap:var(--s-4)}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:var(--s-2)}
.dl-row{display:flex;align-items:center;gap:var(--s-2);font-family:var(--f-mono);font-size:var(--t-sm)}
.dl-sw{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.dl-txt{flex:1;color:var(--c-text-secondary)}
.dl-val{font-weight:600;color:var(--c-text)}

/* === DRAWER === */
.drawer{grid-area:drawer;background:var(--c-surface-1);border-left:1px solid var(--c-border);display:flex;flex-direction:column;overflow:hidden;animation:drawerIn var(--dur) var(--ease)}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;padding:var(--s-4);border-bottom:1px solid var(--c-border);gap:var(--s-2)}
.drawer-sym{font-family:var(--f-display);font-weight:700;font-size:var(--t-xl);color:var(--c-text);letter-spacing:-.02em}
.drawer-body{flex:1;overflow-y:auto;padding:var(--s-4);display:flex;flex-direction:column;gap:var(--s-4)}
.drawer-chart{height:200px;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-md);overflow:hidden;position:relative}
.drawer-chart iframe{width:100%;height:100%;border:0;display:block}
.drawer-qt{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-2)}
.drawer-act{display:flex;flex-direction:column;gap:var(--s-2)}

/* === FAB === */
.fab{position:fixed;right:var(--s-5);bottom:var(--s-5);width:52px;height:52px;border-radius:var(--r-full);background:var(--c-accent);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow-3),var(--shadow-glow-accent);cursor:pointer;transition:transform var(--dur) var(--ease);z-index:var(--z-bar);font-size:22px;font-weight:700}
.fab:hover{transform:scale(1.08)}

/* === COMMAND PALETTE === */
.palette-scrim{position:fixed;inset:0;background:rgba(5,11,24,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:var(--z-palette);display:none;align-items:flex-start;justify-content:center;padding:80px var(--s-4) var(--s-4);animation:fadeIn var(--dur) var(--ease)}
.palette-scrim.open{display:flex}
.palette{width:100%;max-width:560px;background:var(--c-surface-1);border:1px solid var(--c-border-emphasis);border-radius:var(--r-xl);box-shadow:var(--shadow-3);overflow:hidden;animation:paletteIn var(--dur) var(--ease)}
.palette-search{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-3) var(--s-4);border-bottom:1px solid var(--c-border)}
.palette-search input{flex:1;font-size:var(--t-lg);font-family:var(--f-ui);font-weight:500;color:var(--c-text);caret-color:var(--c-accent)}
.palette-search input::placeholder{color:var(--c-text-muted)}
.palette-list{max-height:420px;overflow-y:auto;padding:var(--s-2) 0}
.pl-group{font-family:var(--f-display);font-size:var(--t-xs);font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--c-text-muted);padding:var(--s-3) var(--s-4) var(--s-1)}
.pl-item{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-2) var(--s-4);cursor:pointer;transition:background var(--dur-fast) var(--ease)}
.pl-item:hover,.pl-item.hl{background:var(--c-surface-2)}
.pl-item.hl{box-shadow:inset 2px 0 0 var(--c-accent)}
.pl-icn{width:24px;height:24px;display:grid;place-items:center;background:var(--c-surface-3);border-radius:var(--r-xs);color:var(--c-accent-hi);font-size:12px;font-weight:700;flex-shrink:0}
.pl-txt{flex:1;display:flex;flex-direction:column;gap:1px}
.pl-t{font-size:var(--t-md);color:var(--c-text);font-weight:500}
.pl-s{font-size:var(--t-xs);color:var(--c-text-muted);font-family:var(--f-mono)}
.pl-foot{display:flex;align-items:center;justify-content:space-between;padding:var(--s-2) var(--s-4);border-top:1px solid var(--c-border);background:var(--c-bg);font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-muted);gap:var(--s-2)}
.pl-foot .hints{display:flex;gap:var(--s-3);flex-wrap:wrap}
.pl-hint{display:inline-flex;align-items:center;gap:4px}

/* === MODAL === */
.modal-scrim{position:fixed;inset:0;background:rgba(5,11,24,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:var(--z-modal);display:none;align-items:center;justify-content:center;padding:var(--s-5);animation:fadeIn var(--dur) var(--ease)}
.modal-scrim.open{display:flex}
.modal{width:100%;max-width:560px;max-height:90vh;background:var(--c-surface-1);border:1px solid var(--c-border-emphasis);border-radius:var(--r-xl);box-shadow:var(--shadow-3);display:flex;flex-direction:column;overflow:hidden;animation:modalIn var(--dur) var(--ease)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:var(--s-4) var(--s-5);border-bottom:1px solid var(--c-border)}
.modal-title{font-family:var(--f-display);font-weight:700;font-size:var(--t-lg);color:var(--c-text)}
.modal-body{flex:1;overflow-y:auto;padding:var(--s-5);display:flex;flex-direction:column;gap:var(--s-4)}
.modal-foot{padding:var(--s-3) var(--s-5);border-top:1px solid var(--c-border);display:flex;justify-content:flex-end;gap:var(--s-2)}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-family:var(--f-display);font-size:var(--t-xs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--c-text-muted)}
.field input,.field textarea,.field select{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-sm);padding:10px 12px;color:var(--c-text);font-size:var(--t-md);font-family:var(--f-ui);transition:border-color var(--dur) var(--ease)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--c-accent)}
.field textarea{resize:vertical;min-height:80px;font-family:var(--f-ui)}
.field.mono input{font-family:var(--f-mono);font-variant-numeric:tabular-nums}

/* === TOAST === */
.toast-host{position:fixed;right:var(--s-5);bottom:calc(var(--s-5) + 72px);z-index:var(--z-toast);display:flex;flex-direction:column;gap:var(--s-2);pointer-events:none}
.toast{background:var(--c-surface-1);border:1px solid var(--c-border-emphasis);border-left:3px solid var(--c-accent);border-radius:var(--r-md);padding:var(--s-3) var(--s-4);min-width:260px;max-width:360px;box-shadow:var(--shadow-2);display:flex;align-items:center;gap:var(--s-3);animation:toastIn var(--dur) var(--ease);pointer-events:auto}
.toast.success{border-left-color:var(--c-long)}
.toast.error{border-left-color:var(--c-short)}
.toast.warn{border-left-color:var(--c-warn)}
.toast-txt{flex:1;font-size:var(--t-md);color:var(--c-text)}

/* === RADAR (EZPZ Deep) === */
.radar-wrap{display:flex;justify-content:center;padding:var(--s-4)}
.radar{width:100%;max-width:360px;aspect-ratio:1}
.radar .ring{fill:none;stroke:var(--c-grid);stroke-width:1}
.radar .spoke{stroke:var(--c-grid);stroke-width:1}
.radar .poly{fill:rgba(59,130,246,.15);stroke:var(--c-accent);stroke-width:2;stroke-linejoin:round}
.radar .axis-lbl{fill:var(--c-text-secondary);font-family:var(--f-mono);font-size:9px;font-weight:600}

/* === PLAYBOOK === */
.pb-header{margin-bottom:var(--s-4)}
.pb-intro{padding:var(--s-4);background:var(--c-surface-1);border:1px solid var(--c-border);border-left:3px solid var(--c-long);border-radius:var(--r-lg);font-size:var(--t-md);color:var(--c-text);line-height:1.6;margin-bottom:var(--s-4)}
.pb-intro strong{color:var(--c-long);font-weight:600}
.pb-ctrl{display:flex;gap:var(--s-2);margin-bottom:var(--s-3)}
.pb-sec{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:var(--r-lg);margin-bottom:var(--s-3);overflow:hidden}
.pb-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:var(--s-3) var(--s-4);cursor:pointer;transition:background var(--dur) var(--ease);text-align:left;color:var(--c-text);font-family:var(--f-display);font-weight:600;font-size:var(--t-md);letter-spacing:-.01em}
.pb-toggle:hover{background:var(--c-surface-2)}
.pb-num{color:var(--c-accent-hi);font-family:var(--f-mono);font-size:var(--t-xs);letter-spacing:.08em;margin-right:10px;font-weight:700}
.pb-chev{color:var(--c-text-muted);transition:transform var(--dur) var(--ease)}
.pb-sec.open .pb-chev{transform:rotate(180deg)}
.pb-body{max-height:0;overflow:hidden;transition:max-height var(--dur-slow) var(--ease)}
.pb-sec.open .pb-body{max-height:8000px}
.pb-content{padding:var(--s-4);border-top:1px solid var(--c-border);font-family:var(--f-ui);font-size:var(--t-md);color:var(--c-text-secondary);line-height:1.65;font-weight:400}
.pb-content h3{font-family:var(--f-display);font-weight:700;font-size:var(--t-md);color:var(--c-accent-hi);margin:var(--s-4) 0 var(--s-2);padding-bottom:4px;border-bottom:1px solid var(--c-border)}
.pb-content h3:first-child{margin-top:0}
.pb-content h4{font-family:var(--f-display);font-weight:600;font-size:var(--t-sm);color:var(--c-text);margin:var(--s-3) 0 var(--s-1);text-transform:uppercase;letter-spacing:.06em}
.pb-content p{margin:var(--s-2) 0;color:var(--c-text-secondary)}
.pb-content strong{color:var(--c-text);font-weight:600}
.pb-content em{color:var(--c-text);font-style:italic}
.pb-content ul,.pb-content ol{margin:var(--s-2) 0 var(--s-3);padding-left:22px}
.pb-content li{margin:4px 0}
.pb-content code{font-family:var(--f-mono);background:var(--c-surface-3);border:1px solid var(--c-border);padding:1px 6px;border-radius:var(--r-xs);font-size:var(--t-sm);color:var(--c-accent-hi)}
.pb-content pre{font-family:var(--f-mono);background:var(--c-surface-2);border:1px solid var(--c-border);padding:var(--s-3);border-radius:var(--r-sm);font-size:var(--t-sm);overflow-x:auto;margin:var(--s-3) 0;color:var(--c-text);line-height:1.5}
.pb-content blockquote{border-left:3px solid var(--c-warn);background:var(--c-warn-lo);padding:var(--s-3);margin:var(--s-3) 0;border-radius:0 var(--r-sm) var(--r-sm) 0;color:var(--c-text)}
.pb-content blockquote strong{color:var(--c-warn)}
.pb-content blockquote.pb-callout-danger{border-left-color:var(--c-short);background:var(--c-short-lo)}
.pb-content blockquote.pb-callout-danger strong{color:var(--c-short)}
.pb-content table{width:100%;border-collapse:collapse;margin:var(--s-3) 0;font-family:var(--f-mono);font-size:var(--t-sm);background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-sm);overflow:hidden}
.pb-content th{font-family:var(--f-display);font-weight:700;font-size:var(--t-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-muted);padding:8px 10px;border-bottom:1px solid var(--c-border);background:var(--c-surface-3);text-align:left}
.pb-content td{padding:7px 10px;border-bottom:1px solid var(--c-border);color:var(--c-text);vertical-align:top}
.pb-content tr:last-child td{border-bottom:none}
.pb-content hr{border:none;border-top:1px solid var(--c-border);margin:var(--s-4) 0}
.pb-foot{padding:var(--s-3);background:var(--c-surface-2);border:1px dashed var(--c-border);border-radius:var(--r-md);font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-muted);text-align:center;margin-top:var(--s-3)}

/* === SIGNAL LIST === */
.sig-feed{display:flex;flex-direction:column;gap:var(--s-2)}
.sig-row{background:var(--c-surface-1);border:1px solid var(--c-border);border-left:3px solid var(--c-accent);border-radius:var(--r-md);padding:var(--s-3) var(--s-4);display:grid;grid-template-columns:auto 1fr auto;gap:var(--s-3);align-items:center;cursor:pointer;transition:background var(--dur) var(--ease),transform var(--dur) var(--ease)}
.sig-row:hover{background:var(--c-surface-2);transform:translateX(2px)}
.sig-row.buy{border-left-color:var(--c-long)}
.sig-row.sell{border-left-color:var(--c-short)}
.sig-sym{font-family:var(--f-display);font-weight:700;font-size:var(--t-lg);letter-spacing:-.02em;min-width:60px}
.sig-meta{display:flex;flex-direction:column;gap:2px}
.sig-src{font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-muted)}
.sig-time{font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-muted)}

/* === EZPZ SIGNAL TABLE (inside card expand) === */
.ez-sig-tbl{width:100%;border-collapse:collapse;font-size:var(--t-sm)}
.ez-sig-tbl th{font-family:var(--f-display);font-size:var(--t-xs);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--c-text-muted);padding:6px 8px;text-align:left;border-bottom:1px solid var(--c-border)}
.ez-sig-tbl td{padding:6px 8px;border-bottom:1px solid var(--c-border);vertical-align:top}
.ez-sig-tbl tr:last-child td{border-bottom:none}
.ez-sig-tbl tr.row-bull{background:rgba(16,185,129,.03)}
.ez-sig-tbl tr.row-bear{background:rgba(239,68,68,.03)}
.ez-sig-tbl tr.row-caut{background:rgba(245,158,11,.03)}
.ez-sig-name{font-family:var(--f-ui);font-weight:500;color:var(--c-text);display:block;line-height:1.25}
.ez-sig-sub{font-family:var(--f-mono);font-size:9px;color:var(--c-text-muted);display:block;margin-top:1px}
.ez-sig-detail{font-family:var(--f-mono);font-size:var(--t-xs);color:var(--c-text-secondary);line-height:1.4}

.ss{font-family:var(--f-mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:var(--r-xs);white-space:nowrap;display:inline-block;min-width:40px;text-align:center}
.ss-bull{color:var(--c-long);background:var(--c-long-lo);border:1px solid var(--c-long-hi)}
.ss-bear{color:var(--c-short);background:var(--c-short-lo);border:1px solid var(--c-short-hi)}
.ss-neut{color:var(--c-text-muted);background:var(--c-surface-3);border:1px solid var(--c-border-emphasis)}
.ss-caut{color:var(--c-warn);background:var(--c-warn-lo);border:1px solid rgba(245,158,11,.3)}

/* === EMPTY & SKELETON === */
.empty{padding:var(--s-7) var(--s-4);text-align:center;color:var(--c-text-muted);display:flex;flex-direction:column;align-items:center;gap:var(--s-3)}
.empty .icn{width:56px;height:56px;border-radius:var(--r-full);background:var(--c-surface-1);border:1px solid var(--c-border);display:grid;place-items:center;font-size:24px;color:var(--c-text-muted)}
.empty .title{font-family:var(--f-display);font-weight:600;font-size:var(--t-lg);color:var(--c-text)}
.empty .sub{font-family:var(--f-mono);font-size:var(--t-sm)}
.skel{background:linear-gradient(90deg,var(--c-surface-1) 0%,var(--c-surface-2) 50%,var(--c-surface-1) 100%);background-size:200% 100%;animation:shimmer 1.4s var(--ease) infinite;border-radius:var(--r-sm)}

/* === KEY SHORTCUT HELP === */
.kbd-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-4)}
.kbd-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed var(--c-border);gap:var(--s-3)}
.kbd-row:last-child{border-bottom:none}
.kbd-row .ks{display:flex;gap:4px;flex-shrink:0}
.kbd-row .kd{font-family:var(--f-ui);font-size:var(--t-sm);color:var(--c-text-secondary);text-align:left}

/* === ANIMATIONS === */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes paletteIn{from{opacity:0;transform:translateY(-16px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes modalIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes drawerIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.6}100%{transform:scale(2);opacity:0}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* === RESPONSIVE === */
@media(max-width:900px){
  .app{grid-template-columns:1fr!important;grid-template-areas:"breadth" "cmdbar" "workspace" "sidebar"!important;grid-template-rows:var(--h-breadth) var(--h-cmdbar) 1fr auto}
  .app.drawer-open{grid-template-columns:1fr!important;grid-template-areas:"breadth" "cmdbar" "workspace" "sidebar"!important}
  .sidebar{border-right:none;border-top:1px solid var(--c-border);flex-direction:row;overflow-x:auto;height:auto}
  .side-nav{flex-direction:row;flex:initial;padding:var(--s-2);gap:4px}
  .side-item{padding:8px var(--s-3);font-size:var(--t-sm)}
  .side-item.active::before{left:20%;right:20%;top:initial;bottom:0;width:auto;height:3px}
  .side-item .badge,.side-foot,.side-hdr{display:none}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(400px,100%);z-index:var(--z-drawer);box-shadow:var(--shadow-3)}
  .ws-header{padding:var(--s-3) var(--s-4)}
  .ws-body{padding:var(--s-3)}
  .cmd-center .sess-pills{display:none}
  .logo{font-size:var(--t-sm)}
  .cmd-search{max-width:none}
  .fab{right:var(--s-3);bottom:calc(var(--s-5) + 64px)}
}
@media(max-width:520px){
  .cmd-search .txt{display:none}
  .cmd-clock{display:none}
  .stats-row{grid-template-columns:1fr 1fr}
  .tc-row{grid-template-columns:1fr 1fr 1fr;font-size:var(--t-xs)}
  .tc-sym{font-size:var(--t-lg)}
}

/* === PRINT === */
@media print{
  body{background:#fff;color:#000}
  .breadth,.cmdbar,.sidebar,.drawer,.fab,.toast-host,.palette-scrim,.modal-scrim{display:none!important}
  .app{display:block;height:auto;overflow:visible}
  .workspace{overflow:visible}
  .ws-body{overflow:visible;padding:12px}
  .card,.tcard,.tbl-wrap{break-inside:avoid;border:1px solid #ccc!important;background:#fff!important;color:#000!important;box-shadow:none!important}
  .panel{display:block!important;page-break-before:always}
  .panel:first-child{page-break-before:auto}
  *{color:#000!important}
}

function sessionFor(tz,start,end){
  try{
    const now=new Date();
    const parts=now.toLocaleString('en-US',{timeZone:tz,hour12:false,hour:'2-digit',minute:'2-digit'}).split(':');
    const mins=parseInt(parts[0])*60+parseInt(parts[1]);
    if(mins>=start&&mins<end)return'open';
    if(mins>=start-30&&mins<start)return'pre';
    return'closed';
  }catch(e){return'closed'}
}

  else if(liveFeedStatus==='stale'){feedTxt='Feed: stale';feedCls='feed-stale'}
  else {feedTxt='Feed: loading…';feedCls='feed-loading'}
  el.innerHTML=`<span class="br-lbl">Market</span>`+items+`<span class="br-lbl ${feedCls}" style="margin-left:auto" title="Yahoo via Cloudflare Worker"><span class="feed-dot"></span>${feedTxt}</span>`;
}

/* === LIVE QUOTE FETCH === */
function neededSymbols(){
  const set=new Set();
  BREADTH_SYMS.forEach(s=>set.add(s.ySym));
  Object.values(ALL_DAYS_DATA.days).forEach(d=>d.tickers.forEach(t=>set.add(t.ticker)));
  if(drawerTicker)set.add(drawerTicker);
  return Array.from(set);
}
async function refreshLiveQuotes(){
  const syms=neededSymbols();
  if(!syms.length){renderBreadth();return}
  const batches=[];
  for(let i=0;i<syms.length;i+=25)batches.push(syms.slice(i,i+25));
  try{
    const jsonArr=await Promise.all(batches.map(b=>
      fetch(`${WORKER_URL}/quote?symbols=${encodeURIComponent(b.join(','))}`).then(r=>{
        if(!r.ok)throw new Error('http_'+r.status);
        return r.json();
      })
    ));
    let got=0;
    jsonArr.forEach(j=>(j&&j.quotes||[]).forEach(q=>{
      if(q && q.price!=null){liveQuotes[q.symbol]=q;got++}
    }));
    if(got>0){liveFeedStatus='live';liveFeedLastOk=Date.now()}
    else {liveFeedStatus='stale'}
  }catch(e){
    if(liveFeedLastOk && Date.now()-liveFeedLastOk<STALE_AFTER_MS){
      // keep showing live for a grace window before flipping to stale
      liveFeedStatus='live';
    } else {
      liveFeedStatus='stale';
    }
  }
  renderBreadth();
  renderMiniWatchlist();
  refreshDrawerLive();
}

/* === CORRELATION MATRIX === */
const CORR_CACHE_KEY = 'oliver_corr_ohlcv';
const CORR_CACHE_TTL_MS = 24 * 60 * 60 * 1000;
const CORR_WINDOW_DAYS = 30;
const CORR_FETCH_RANGE = '3mo'; // ~60 trading days, plenty of headroom
let corrState = { loading:false, lastError:null, fetchedAt:null };

function corrUniverse(){
  const set = new Set();
  Object.values(ALL_DAYS_DATA.days).forEach(d=>d.tickers.forEach(t=>set.add(t.ticker)));
  return Array.from(set).sort();
}
function loadCorrCache(){
  try{return JSON.parse(localStorage.getItem(CORR_CACHE_KEY)||'{}')||{}}
  catch(e){return {}}
}
function saveCorrCache(c){
  try{localStorage.setItem(CORR_CACHE_KEY,JSON.stringify(c))}catch(e){}
}
function isCacheFresh(entry){
  return entry && entry.fetchedAt && (Date.now() - entry.fetchedAt) < CORR_CACHE_TTL_MS && Array.isArray(entry.closes) && entry.closes.length >= CORR_WINDOW_DAYS + 1;
}
async function fetchCloses(ticker){
  const url = `${WORKER_URL}/chart?symbol=${encodeURIComponent(ticker)}&range=${CORR_FETCH_RANGE}&interval=1d`;
  const res = await fetch(url);
  if(!res.ok)throw new Error('http_'+res.status);
  const j = await res.json();
  const result = j && j.chart && j.chart.result && j.chart.result[0];
  if(!result)throw new Error('no_data');
  const closes = ((result.indicators && result.indicators.quote && result.indicators.quote[0] && result.indicators.quote[0].close) || [])
    .map(v => (v==null || isNaN(v)) ? null : Number(v))
    .filter(v => v!=null);
  if(closes.length < 2)throw new Error('insufficient_data');
  return closes;
}
function dailyReturns(closes){
  const r = [];
  for(let i=1;i<closes.length;i++){
    const prev = closes[i-1], cur = closes[i];
    if(prev && prev !== 0) r.push((cur - prev) / prev);
  }
  return r;
}
function pearson(a,b){
  const n = Math.min(a.length,b.length);
  if(n < 3)return null;
  const xs = a.slice(-n), ys = b.slice(-n);
  let sx=0,sy=0;for(let i=0;i<n;i++){sx+=xs[i];sy+=ys[i]}
  const mx=sx/n, my=sy/n;
  let num=0,dx=0,dy=0;
  for(let i=0;i<n;i++){const ex=xs[i]-mx, ey=ys[i]-my;num+=ex*ey;dx+=ex*ex;dy+=ey*ey}
  const denom = Math.sqrt(dx*dy);
  if(denom===0 || !isFinite(denom))return null;
  return num / denom;
}
function corrCellColor(r){
  if(r==null)return '';
  const clamped = Math.max(-1, Math.min(1, r));
  const alpha = Math.min(0.75, Math.abs(clamped) * 0.75);
  if(clamped >= 0){
    return `background:rgba(16,185,129,${alpha.toFixed(3)})`;
  }
  return `background:rgba(239,68,68,${alpha.toFixed(3)})`;
}
async function renderCorrelation(opts){
  opts = opts || {};
  const el = $('#tab-corr');if(!el)return;
  const tickers = corrUniverse();
  if(!tickers.length){el.innerHTML = emptyState('No tickers in universe','Add setups to populate the correlation matrix');return}

  // 1) Paint with whatever cache we have
  let cache = loadCorrCache();
  if(opts.force){cache = {};}

  const renderFromCache = () => {
    const closesMap = {};
    const missing = [];
    tickers.forEach(t=>{
      const entry = cache[t];
      if(isCacheFresh(entry))closesMap[t] = entry.closes;
      else missing.push(t);
    });
    const ready = Object.keys(closesMap);
    const returns = {};
    ready.forEach(t=>{returns[t] = dailyReturns(closesMap[t]).slice(-CORR_WINDOW_DAYS)});

    const meta = [];
    meta.push(`<span class="pill">Window · ${CORR_WINDOW_DAYS}d returns</span>`);
    meta.push(`<span class="pill">Universe · ${tickers.length} tickers</span>`);
    if(ready.length < tickers.length){
      meta.push(`<span class="pill" style="color:var(--c-warn)">Fetching · ${tickers.length - ready.length} remaining</span>`);
    }
    if(corrState.lastError){
      meta.push(`<span class="pill" style="color:var(--c-warn)">Last error: ${esc(corrState.lastError)}</span>`);
    }
    if(corrState.fetchedAt){
      const mins = Math.round((Date.now()-corrState.fetchedAt)/60000);
      meta.push(`<span class="pill">Refreshed · ${mins<1?'just now':mins+'m ago'}</span>`);
    }

    // Build grid (full symmetric — easier to read than triangle)
    let head = '<thead><tr><th class="corner"></th>';
    tickers.forEach(t=>{head += `<th class="col">${esc(t)}</th>`});
    head += '</tr></thead>';

    let body = '<tbody>';
    tickers.forEach(rowT=>{
      body += `<tr><th class="row">${esc(rowT)}</th>`;
      tickers.forEach(colT=>{
        if(rowT === colT){
          body += `<td class="diag">1.00</td>`;
          return;
        }
        const a = returns[rowT], b = returns[colT];
        if(!a || !b){
          body += `<td class="na">—</td>`;
          return;
        }
        const r = pearson(a,b);
        if(r==null){body += `<td class="na">—</td>`;return}
        body += `<td style="${corrCellColor(r)}" title="${rowT}↔${colT} · r=${r.toFixed(3)}">${r>=0?'':''}${r.toFixed(2)}</td>`;
      });
      body += `</tr>`;
    });
    body += '</tbody>';

    el.innerHTML =
      `<div class="corr-meta">${meta.join('')}</div>`
      + `<div class="corr-wrap"><table class="corr-grid">${head}${body}</table></div>`
      + `<div class="corr-legend"><span>Correlation</span><span>−1</span><span class="bar"></span><span>+1</span><span class="mute" style="margin-left:auto">Hover a cell to see exact r</span></div>`;
  };

  renderFromCache();

  // 2) Fetch any stale/missing tickers in the background
  const toFetch = tickers.filter(t => !isCacheFresh(cache[t]));
  if(toFetch.length === 0 || corrState.loading)return;

  corrState.loading = true;
  corrState.lastError = null;
  try{
    // Small concurrency limit to be polite to the Worker
    const LIMIT = 6;
    let i = 0;
    async function worker(){
      while(i < toFetch.length){
        const idx = i++;
        const sym = toFetch[idx];
        try{
          const closes = await fetchCloses(sym);
          cache[sym] = { closes, fetchedAt: Date.now() };
          saveCorrCache(cache);
        }catch(e){
          // Cache a short negative marker so we don't hammer on broken tickers
          cache[sym] = { closes: [], fetchedAt: Date.now() - CORR_CACHE_TTL_MS + 5*60*1000, error: String(e.message||e) };
          saveCorrCache(cache);
        }
      }
    }
    await Promise.all(Array.from({length:Math.min(LIMIT,toFetch.length)},()=>worker()));
    corrState.fetchedAt = Date.now();
  }catch(e){
    corrState.lastError = String(e.message||e);
  }finally{
    corrState.loading = false;
    if(currentNavTab === 'corr')renderFromCache();
  }
}

function allSetupsCount(){

  return c;
}
function renderMiniWatchlist(){
  const el=$('#mw-list');if(!el)return;
  const tickers={};
  Object.values(ALL_DAYS_DATA.days).forEach(d=>d.tickers.forEach(t=>{
    if(!tickers[t.ticker]||t.entryDate>tickers[t.ticker].entryDate)tickers[t.ticker]=t;
  }));
  const rows=Object.values(tickers).map(t=>{
    const q=liveQuotes[t.ticker];
    const livePct = q && q.changePercent!=null ? q.changePercent : null;
    return {t, q, livePct, sortKey: Math.abs(livePct!=null?livePct:(t.pnlPct||0))};
  });
  const top=rows.sort((a,b)=>b.sortKey-a.sortKey).slice(0,5);
  if(!top.length){el.innerHTML='<div class="mw-row mute">No positions</div>';return}
  el.innerHTML=top.map(o=>{
    const t=o.t, q=o.q;
    const px = q && q.price!=null ? q.price : t.currentPrice;
    const pct = o.livePct!=null ? o.livePct : t.pnlPct;
    const cls=(pct||0)>=0?'long':'short';
    const dot = q ? '' : '<span class="stale-dot" title="using fallback"></span>';
    return `<div class="mw-row" onclick="openDrawer('${t.ticker}')"><span class="mw-sym">${dot}${t.ticker}</span><span class="mw-px">${fmtP(px)}</span><span class="mw-ch ${cls}">${fmtPct(pct)}</span></div>`;
  }).join('');
}

  {id:2,title:'Chart Analysis (4HR Timeframe)',body:`
<blockquote><strong>Why 4H?</strong> 1D too slow — you miss the explosive entry. 1H too noisy for the base-read. 4H gives 6 bars per NY session — enough resolution to see structure without getting chopped.</blockquote>
<h3>2.1 Reading Time Dilation</h3><p>Time Dilation is a regime/compression indicator. Watch this sequence on the 4H:</p><ol><li><strong>Extended compression</strong> (orange/red) during the downtrend — volatility bleeding as sellers exhaust.</li><li><strong>First flip to green</strong> = wake-up call, NOT an entry.</li><li><strong>4H candle closes above the most recent swing high</strong> with Dilation still green = the breakout trigger.</li></ol>
<h4>Valid Breakout</h4><ul><li>Close above prior 4H swing high by <strong>&gt; 0.3 × ATR(10)</strong>.</li><li>Dilation green and <strong>widening</strong> (expanding regime, not compressing).</li><li>Volume on breakout bar <strong>&gt; 1.5× 20-bar average</strong>.</li></ul>
<h4>Fake-out (the UCAR Example)</h4><ul><li>Price pokes above swing high intrabar but <strong>closes back inside</strong> the prior range.</li><li><strong>RSI hits upper Bollinger band and immediately rejects</strong> — wicks into upper BB, closes below mid-band.</li><li>Dilation flickers green then snaps back to neutral/red next bar.</li><li>Volume on the poke bar is <em>below</em> average — no commitment.</li></ul>
<blockquote class="pb-callout-danger"><strong>UCAR rule:</strong> If RSI tags upper BB and the SAME bar closes in the lower half of its range, the breakout is dead. Do not retry same bar. Wait for a full 4H close back above the band.</blockquote>
<h3>2.2 Rebase vs Rollover</h3><h4>Rebase (continuation)</h4><ul><li>After first squeeze leg, price consolidates in the <strong>upper third</strong> of the move.</li><li>Pullbacks hold above 4H 20EMA AND VWAP.</li><li>RSI works off overbought via <em>time</em>, not price (flat while price grinds sideways).</li><li>Volume dries up during the base — shorts trapped, not covered.</li></ul>
<h4>Rollover (do not long)</h4><ul><li>Lower high within 2–3 bars of initial push.</li><li>RSI makes a clear lower high.</li><li>Dilation flips back to red.</li><li>Volume spikes on red bars — distribution.</li></ul>
<h3>2.3 Ideal 4H Long Setup — Checklist</h3><pre>    ___
   /   \\___          <- rebase (tight, 3-6 bars in upper third)
  /        \\____/\\___  <- breakout above range high, Dilation green, volume > 1.5x
 /
/___________________   <- prior multi-week downtrend broken</pre>
<ul><li>☐ Prior downtrend line broken on a 4H close</li><li>☐ Time Dilation green and expanding</li><li>☐ 4H close &gt; prior swing high by &gt; 0.3 × ATR(10)</li><li>☐ Volume on breakout bar &gt; 1.5 × 20-bar avg</li><li>☐ RSI between 55–70 (strong, not yet exhausted)</li><li>☐ 4H 20EMA sloping up</li></ul>
<h3>2.4 What Invalidates</h3><ul><li>4H close <strong>below</strong> the breakout level → setup dead, no re-entry same day.</li><li>Time Dilation flips red within 2 bars of entry → close immediately.</li><li>News catalyst you hadn't priced in → exit first, ask questions later.</li><li>4H bearish engulfing on volume &gt; breakout bar → full invalidation.</li></ul>`},
  {id:3,title:'Entry Refinement (15m / 1H)',body:`
<blockquote><strong>Workflow.</strong> 4H tells you <strong>what</strong> to trade and <strong>in which direction</strong>. 15m/1H tells you <strong>when</strong> and <strong>at what price</strong>.</blockquote>
<h3>3.1 Multi-Timeframe S/R</h3><p>Load MTF S/R on 15m showing 1H and 4H levels.</p><ul><li><strong>Ideal entry zone:</strong> 15m price pulling back into the <strong>prior 4H resistance that just broke</strong> (now support). The "first touch back-test".</li><li><strong>Invalid entry:</strong> Buying INTO 4H resistance from below, before the 4H has closed through it. That's chasing.</li></ul>
<h3>3.2 Market Regime Confirmation</h3><table><thead><tr><th>15m</th><th>1H</th><th>Action</th></tr></thead><tbody><tr><td>Bullish</td><td>Bullish</td><td><strong>Full size</strong> — green light</td></tr><tr><td>Bullish</td><td>Neutral</td><td>Half size, tight stop</td></tr><tr><td>Bullish</td><td>Bearish</td><td>Pass — squeeze hasn't propagated up yet</td></tr><tr><td>Bearish</td><td>Any</td><td>Pass — wait for flip</td></tr></tbody></table>
<h3>3.3 VWAP as Entry Trigger</h3><p>On heavily shorted names, VWAP is the algo reference line. Shorts cover into VWAP reclaims.</p><p><strong>Entry trigger (all three required):</strong></p><ol><li>15m candle closes <strong>above session VWAP</strong> after pulling back to it.</li><li>Next 15m candle <strong>holds above VWAP</strong> (no wick rejection back below).</li><li><strong>Short-volume % falling intraday</strong> (check <code>/stocks/stock/short-volume/</code>) — confirms covering.</li></ol><p><strong>Stop:</strong> below the VWAP reclaim bar low, OR 1 × ATR(15m, 14) below entry — whichever is <strong>tighter</strong>.</p>
<h3>3.4 Time Dilation on 15m</h3><ul><li>15m Dilation <strong>green at entry</strong>.</li><li>15m Dilation flipped green <strong>more recently than 4H</strong> — lower TF momentum syncing with higher TF regime.</li><li>15m red + 4H green = mid-pullback. Wait for 15m flip or pass.</li></ul>
<h3>3.5 Confluence Score (≥ 4/5 required)</h3><table><thead><tr><th>Signal</th><th>Met?</th></tr></thead><tbody><tr><td>4H: closed breakout, Dilation green, RSI 55–70</td><td>☐</td></tr><tr><td>MTF S/R: pulling back to reclaimed 4H level</td><td>☐</td></tr><tr><td>Market Regime bullish on both 15m and 1H</td><td>☐</td></tr><tr><td>VWAP reclaim + hold on 15m</td><td>☐</td></tr><tr><td>Short volume % falling intraday (EZPZ)</td><td>☐</td></tr></tbody></table><p><strong>5/5</strong> = full size. <strong>4/5</strong> = half size. <strong>≤ 3/5</strong> = pass.</p>`},
  {id:4,title:'Trade Management',body:`
<h3>4.1 Hold Time</h3><ul><li><strong>Default:</strong> Intraday scalp to 1-day hold. Squeeze names rarely give clean multi-day trends.</li><li><strong>Extended (1–2 days):</strong> Only if 4H closes above breakout two bars running with rising volume AND short-vol % still falling AND stop is at BE or better.</li><li><strong>Never &gt; 3 days</strong> without re-scanning EZPZ to confirm Utilization still ≥ 90%. Drop from 95 → 75% = covering done = exit.</li></ul>
<h3>4.2 Position Sizing</h3><p>Squeeze names are <strong>beta 3–5</strong> vs market. Size accordingly.</p><ul><li><strong>Max risk per trade:</strong> 0.5% of account (half of normal swing size).</li><li><strong>Max notional per name:</strong> 5% of account.</li><li><strong>Max combined notional:</strong> 15% of account across all active squeeze plays.</li><li><strong>Never average down</strong> on a losing squeeze long. Shorts are rational on entries, irrational on exits — if wrong, you are <em>very</em> wrong.</li></ul>
<h3>4.3 Stops</h3><blockquote class="pb-callout-danger">Squeeze stocks spike then immediately sell off — the classic "morning squeeze, afternoon fade". Stops must account for this.</blockquote><ul><li><strong>Hard stop:</strong> entry − (1 × 15m ATR(14)) OR below VWAP reclaim bar — whichever is tighter.</li><li><strong>Mental stop:</strong> 15m Dilation flips back to red → exit at next bar open, don't wait for hard stop.</li><li><strong>Time stop:</strong> entry bar +6 bars (15m) no new high → reduce 50%. +12 bars still no new high → full exit.</li></ul><blockquote class="pb-callout-danger"><strong>Critical:</strong> Do NOT widen your stop because "it's just a wick". Squeeze stocks wick -5% then go -15%. Your stop is your stop.</blockquote>
<h3>4.4 Profit Taking</h3><p>These stocks reward <strong>aggressive scaling</strong>, not held targets.</p><ul><li><strong>+1R:</strong> trim 1/3. Move stop to breakeven on the rest.</li><li><strong>+2R:</strong> trim another 1/3. Trail remainder under 15m 20EMA.</li><li><strong>Final 1/3:</strong> trail under each new 15m swing low OR exit on 15m close below VWAP — whichever first.</li><li><strong>Never raise a target mid-trade.</strong> Greed is the #1 killer on squeezes.</li></ul>
<h3>4.5 Knowing When the Squeeze is Done</h3><p>Exit ALL units on ANY of:</p><ul><li>Utilization % drops &gt; 10 points on next EZPZ update.</li><li>Short Position Change % flips negative by more than -15%.</li><li>Synthetic Signal drops from EXTREME → BONA FIDE.</li><li>Short volume % falls below 40% for 2 consecutive days.</li><li>4H closes below the breakout level.</li></ul>`},
  {id:5,title:'Risk Warnings & Behavioural Rules',body:`
<h3>5.1 Why These Stocks Behave Irrationally</h3><p>Heavily shorted stocks are <strong>not trading on fundamentals</strong>. Price is being set by:</p><ol><li>Margin calls forcing shorts to cover at any price → vertical spikes.</li><li>Short-sellers adding when price pops → immediate fades after pops.</li><li>Retail flow piling in on any green bar → false confirmation.</li><li>Options hedging amplifying both directions (gamma squeezes + gamma flushes).</li><li>Borrow availability changing in real time — a hard-to-borrow notice can flip the tape in minutes.</li></ol><blockquote>You are not trading a company. You are trading a <strong>liquidity crisis for shorts</strong>. Treat it as such.</blockquote>
<h3>5.2 Common Mistakes</h3><ul><li>❌ Chasing the first 4H bar before it has closed. Wait for the close.</li><li>❌ Sizing up because "this one feels different". They never do.</li><li>❌ Ignoring Utilization drop because the chart still looks bullish. The chart lags the data.</li><li>❌ Adding on the pullback after first profit-take. That's trading against your plan.</li><li>❌ Holding through earnings. Squeeze names round-trip on earnings regardless.</li><li>❌ Going short the fade. Borrow is expensive/nonexistent — reverse squeezes are brutal.</li><li>❌ Market orders at the open. Spreads on squeeze names can be 2–3%. Limit only.</li></ul>
<h3>5.3 Hard Rules — Every Trade, No Exceptions</h3><ol><li><strong>Never hold through an earnings release.</strong> Flatten by the close of the prior session.</li><li><strong>Never lift your stop.</strong> You can trail it tighter, never wider.</li><li><strong>Never trade the same name twice the same day</strong> if the first trade stopped out.</li><li><strong>Never enter before 15 minutes after the open.</strong> Let price find VWAP first.</li><li><strong>Never enter in the last 30 minutes</strong> unless exiting an existing profitable position.</li><li><strong>Never trade more than 3 squeeze names at once.</strong> Correlation across HTB names is near 1.0 on macro days.</li><li><strong>Always re-scan EZPZ</strong> the morning of any holding day. Data flipped → you flip.</li><li><strong>Always write the trade plan</strong> (entry, stop, target, time stop) before clicking buy. Can't write it? You don't have a trade.</li></ol>`},

/* === DAYS / SETUPS === */
function allTickers(){
  const a=[];
  DAYS_ORDER.forEach(k=>ALL_DAYS_DATA.days[k].tickers.forEach(t=>a.push({...t,dayKey:k,dayLabel:ALL_DAYS_DATA.days[k].label})));
  return a;
}
function stageFor(t){
  if(t.status==='HIT TARGET')return'CLOSED';
  if(t.status==='STOPPED OUT')return'CLOSED';
  if(t.status==='EXPIRED')return'CLOSED';
  if(t.status==='IN PLAY')return'MANAGING';
  if(t.status==='OPEN')return Math.abs(t.progressPct||0)>5?'ENTERED':'ALERTED';
  return'WATCHING';
}

function renderSetups(){
  const el=$('#tab-setups');if(!el)return;
  const day=ALL_DAYS_DATA.days[currentDayKey];
  if(!day){el.innerHTML=emptyState('No day selected','Pick a day above');return}
  const tickers=day.tickers;
  const counts={STRONG:0,WEAK:0,AVOID:0,LONG:0,SHORT:0};
  tickers.forEach(t=>{counts[t.verdict]=(counts[t.verdict]||0)+1;counts[t.direction]=(counts[t.direction]||0)+1});
  const stageBuckets={WATCHING:[],ALERTED:[],ENTERED:[],MANAGING:[],CLOSED:[]};
  tickers.forEach(t=>stageBuckets[stageFor(t)].push(t));

  const dateStrip=DAYS_ORDER.map(k=>{
    const d=ALL_DAYS_DATA.days[k];
    const active=k===currentDayKey?' active':'';
    const dot=d.tickers.some(t=>t.verdict==='STRONG')?'<span class="dd"></span>':'';
    return `<div class="date-tab${active}" onclick="switchDay('${k}')" role="tab"><span>${d.label}</span>${dot}</div>`;
  }).join('');

  const stats=`<div class="stats-row">
    <div class="stat"><div class="lbl">Setups</div><div class="val">${tickers.length}</div><div class="sub">Today</div></div>
    <div class="stat long"><div class="lbl">Longs</div><div class="val">${counts.LONG||0}</div></div>
    <div class="stat short"><div class="lbl">Shorts</div><div class="val">${counts.SHORT||0}</div></div>
    <div class="stat long"><div class="lbl">Strong</div><div class="val">${counts.STRONG||0}</div></div>
    <div class="stat warn"><div class="lbl">Weak</div><div class="val">${counts.WEAK||0}</div></div>
    <div class="stat short"><div class="lbl">Avoid</div><div class="val">${counts.AVOID||0}</div></div>
  </div>`;

  const kanban=`<div class="kanban">${['WATCHING','ALERTED','ENTERED','MANAGING','CLOSED'].map(st=>{
    const items=stageBuckets[st];
    const cards=items.length?items.map(t=>tickerCard(t)).join(''):`<div class="k-empty">No items</div>`;
    return `<div class="k-col"><div class="k-hdr"><span>${st}</span><span class="k-cnt">${items.length}</span></div><div class="k-body">${cards}</div></div>`;
  }).join('')}</div>`;

  el.innerHTML=`<div class="date-strip" role="tablist">${dateStrip}</div>${stats}${kanban}`;
}

function tickerCard(t){
  const isLong=t.direction==='LONG';
  const dirCls=isLong?'dir-long':'dir-short';
  const vCls=t.verdict==='STRONG'?'v-strong':t.verdict==='WEAK'?'v-weak':'v-avoid';
  const dirBadge=isLong?'<span class="tc-dir long">▲ LONG</span>':'<span class="tc-dir short">▼ SHORT</span>';
  const statusCls=t.status==='HIT TARGET'?'st-hit':t.status==='STOPPED OUT'?'st-stop':t.status==='IN PLAY'?'st-play':'st-open';
  const chCls=(t.priceChange||0)>=0?'br-up':'br-dn';
  const arr=(t.priceChange||0)>=0?'▲':'▼';
  const progFill=clamp(Math.abs(t.progressPct||0),0,100);
  const pnlPos=(t.pnlPct||0)>=0;
  const convN=parseFloat((t.conviction||'0').split('/')[0])||0;
  const convMax=parseFloat((t.conviction||'0/10').split('/')[1])||10;
  const convPct=(convN/convMax)*100;
  const convColor=t.verdict==='STRONG'?'var(--c-long)':t.verdict==='WEAK'?'var(--c-warn)':'var(--c-short)';
  const convRing=`<div class="tc-conv-ring"><svg viewBox="0 0 36 36" width="32" height="32"><circle class="track" cx="18" cy="18" r="15"/><circle class="fill" cx="18" cy="18" r="15" stroke="${convColor}" stroke-dasharray="${convPct*0.942} 94.2" stroke-dashoffset="0"/></svg><span class="lbl">${convN}</span></div>`;
  return `<div class="tcard ${dirCls} ${vCls}" onclick="openDrawer('${esc(t.ticker)}')" role="button" tabindex="0" aria-label="${t.ticker} ${t.direction} setup">
    <div class="tc-head"><span class="tc-sym">${t.ticker}</span>${dirBadge}${convRing}</div>
    <div class="tc-row"><div class="tc-cell"><div class="lbl">Entry</div><div class="val">${fmtP(t.entry)}</div></div><div class="tc-cell"><div class="lbl">Stop</div><div class="val stop">${fmtP(t.stop)}</div></div><div class="tc-cell"><div class="lbl">Target</div><div class="val tgt">${fmtP(t.target)}</div></div></div>
    <div class="tc-live"><span class="px">${fmtP(t.currentPrice)}</span><span class="ch ${chCls}">${arr} ${fmtPct(t.priceChangePct)}</span><span class="tc-status ${statusCls}">${t.status||'OPEN'}</span></div>
    <div class="tc-progress"><div class="tc-track"><div class="tc-fill ${isLong?'long':'short'}" style="width:${progFill}%"></div></div><div class="tc-pnl"><span>${pnlPos?'+':''}${fmt(t.pnlPct)}%</span><span>R:R 1:${fmt(t.rrRatio,1)}</span></div></div>
  </div>`;
}

/* === EMPTY STATE === */
function emptyState(title,sub,icn){return`<div class="empty"><div class="icn">${icn||'○'}</div><div class="title">${title}</div><div class="sub">${sub||''}</div></div>`}

/* === PERFORMANCE === */
function renderPerf(){
  const el=$('#tab-perf');if(!el)return;
  const s=ALL_DAYS_DATA.allTimeStats;
  const all=allTickers();
  const closed=all.filter(t=>['HIT TARGET','STOPPED OUT','EXPIRED'].includes(t.status));
  const wins=closed.filter(t=>t.status==='HIT TARGET').length;
  const losses=closed.filter(t=>t.status==='STOPPED OUT').length;
  const winRate=closed.length?Math.round(wins/closed.length*100):null;
  const opens=all.filter(t=>['OPEN','IN PLAY'].includes(t.status));
  const openPnL=opens.reduce((a,t)=>a+(t.pnlDollar||0),0);
  const avgR=all.filter(t=>t.rrRatio).reduce((a,t,_,arr)=>a+t.rrRatio/arr.length,0);
  const best=opens.length?opens.reduce((a,b)=>(b.pnlPct||0)>(a.pnlPct||0)?b:a):null;

  const headlineStats=`<div class="stats-row">

    <div class="stat ${winRate==null?'':winRate>=50?'long':'short'}"><div class="lbl">Win Rate</div><div class="val">${winRate==null?'—':winRate+'%'}</div><div class="sub">${closed.length} closed</div></div>
    <div class="stat long"><div class="lbl">Avg R:R</div><div class="val">${fmt(avgR||s.avgRR,2)}</div><div class="sub">Planned</div></div>
    <div class="stat ${openPnL>=0?'long':'short'}"><div class="lbl">Open P&L</div><div class="val">${fmtSigned(openPnL)}</div><div class="sub">${opens.length} positions</div></div>
  </div>`;

  const equity=equityCurveSVG(all);
  const heatmap=monthlyHeatmapSVG(all);
  const donut=winRateDonut(wins,losses,opens.length);
  const rDist=rMultipleHistogram(all);
  const sourceRows=Object.entries(s.signalSourceStats).map(([n,v])=>{
    const tot=v.wins+v.losses;
    const wr=tot?Math.round(v.wins/tot*100):null;
    const clr=wr==null?'var(--c-text-muted)':wr>=60?'var(--c-long)':wr>=40?'var(--c-warn)':'var(--c-short)';
    return `<div class="dl-row"><span class="dl-sw" style="background:${clr}"></span><span class="dl-txt">${n}</span><span class="dl-val">${v.count} · ${wr==null?'—':wr+'%'}</span></div>`;
  }).join('');

  const bwCards=`<div class="grid-2">
    <div class="card"><div class="card-hdr"><div class="card-title">Best open</div><span class="badge b-bull">WINNER</span></div>${best?`<div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px"><span class="display" style="font-size:var(--t-2xl);font-weight:700">${best.ticker}</span><span class="mono long" style="font-weight:600">${fmtPct(best.pnlPct)}</span></div><div class="mono sec" style="font-size:var(--t-sm);margin-top:6px">${fmtSigned(best.pnlDollar)} · entry ${fmtP(best.entry)} · ${best.direction}</div>`:emptyState('No open trades')}</div>
    <div class="card"><div class="card-hdr"><div class="card-title">Worst open</div><span class="badge b-bear">LAGGARD</span></div>${worst?`<div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px"><span class="display" style="font-size:var(--t-2xl);font-weight:700">${worst.ticker}</span><span class="mono short" style="font-weight:600">${fmtPct(worst.pnlPct)}</span></div><div class="mono sec" style="font-size:var(--t-sm);margin-top:6px">${fmtSigned(worst.pnlDollar)} · entry ${fmtP(worst.entry)} · ${worst.direction}</div>`:''}</div>
  </div>`;

  const rows=all.sort((a,b)=>b.dayKey.localeCompare(a.dayKey)).map(t=>{
    const pCls=(t.pnlDollar||0)>=0?'long':'short';
    return `<tr onclick="openDrawer('${esc(t.ticker)}')"><td class="mute" style="font-size:var(--t-xs)">${t.dayLabel}</td><td class="display" style="font-weight:700">${t.ticker}</td><td><span class="badge ${t.direction==='LONG'?'b-bull':'b-bear'}">${t.direction==='LONG'?'▲':'▼'} ${t.direction}</span></td><td><span class="badge ${t.verdict==='STRONG'?'b-bull':t.verdict==='WEAK'?'b-warn':'b-bear'}">${t.verdict}</span></td><td>${fmtP(t.entry)}</td><td>${fmtP(t.currentPrice)}</td><td class="${pCls}">${fmtPct(t.pnlPct)}</td><td><span class="mono ${pCls}">${fmtSigned(t.pnlDollar)}</span></td></tr>`;
  }).join('');

  el.innerHTML=`${headlineStats}
    <div class="grid-2"><div class="card"><div class="card-hdr"><div class="card-title">Equity Curve (running P&L)</div></div>${equity}</div><div class="card"><div class="card-hdr"><div class="card-title">Win Rate Breakdown</div></div>${donut}</div></div>
    <div class="grid-2" style="margin-top:var(--s-4)"><div class="card"><div class="card-hdr"><div class="card-title">P&L Calendar</div><span class="mute mono" style="font-size:var(--t-xs)">green=win · red=loss · grey=open</span></div>${heatmap}</div><div class="card"><div class="card-hdr"><div class="card-title">R-Multiple Distribution</div></div>${rDist}</div></div>
    <div class="grid-2" style="margin-top:var(--s-4)"><div class="card"><div class="card-hdr"><div class="card-title">Signal Source Attribution</div></div>${sourceRows?`<div class="donut-legend">${sourceRows}</div>`:emptyState('No source data')}</div><div class="card"><div class="card-hdr"><div class="card-title">Expectancy</div></div><div style="display:flex;flex-direction:column;gap:8px;font-family:var(--f-mono);font-size:var(--t-md)"><div style="display:flex;justify-content:space-between"><span class="sec">Win rate</span><span style="color:var(--c-text);font-weight:600">${winRate==null?'—':winRate+'%'}</span></div><div style="display:flex;justify-content:space-between"><span class="sec">Avg R:R (planned)</span><span style="color:var(--c-text);font-weight:600">${fmt(avgR||s.avgRR,2)}</span></div><div style="display:flex;justify-content:space-between"><span class="sec">Closed trades</span><span style="color:var(--c-text);font-weight:600">${closed.length}</span></div><div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--c-border)"><span class="sec">Expectancy / trade</span><span class="${winRate!=null&&winRate>40?'long':'sec'}" style="font-weight:600">${winRate==null?'Awaiting closed trades':(((winRate/100)*(avgR||s.avgRR))-(1-winRate/100)).toFixed(2)+'R'}</span></div></div></div></div>
    <div style="margin-top:var(--s-4)">${bwCards}</div>
    <div class="card" style="margin-top:var(--s-4);padding:0"><div class="card-hdr" style="padding:var(--s-3) var(--s-4);margin:0"><div class="card-title">All Trades</div><button class="btn small" onclick="exportTradesCSV()">Export CSV</button></div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Date</th><th>Ticker</th><th>Dir</th><th>Verdict</th><th>Entry</th><th>Current</th><th>P&L%</th><th>P&L$</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

/* === EQUITY CURVE (cumulative P&L over entries) === */
function equityCurveSVG(all){
  if(!all.length)return emptyState('No trades yet');
  const byDay={};
  all.forEach(t=>{byDay[t.dayKey]=(byDay[t.dayKey]||0)+(t.pnlDollar||0)});
  const sorted=Object.keys(byDay).sort();
  let cum=0;const pts=sorted.map(k=>{cum+=byDay[k];return {x:k,y:cum}});
  if(pts.length<2)pts.unshift({x:'start',y:0});
  const w=600,h=180,pad=24;
  const maxY=Math.max(...pts.map(p=>p.y),1);const minY=Math.min(...pts.map(p=>p.y),-1);
  const rng=maxY-minY||1;
  const sx=i=>pad+(i/(pts.length-1))*(w-pad*2);
  const sy=v=>h-pad-((v-minY)/rng)*(h-pad*2);
  const zeroY=sy(0);
  const linePts=pts.map((p,i)=>`${sx(i)},${sy(p.y)}`).join(' ');
