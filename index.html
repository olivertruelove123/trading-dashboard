<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Oliver's Setups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#050709;--surface:#090c14;--surface2:#0d1019;--border:#161d2c;--border2:#1e2840;--accent-green:#00e5a0;--accent-red:#ff4d6d;--accent-yellow:#ffbe0b;--accent-blue:#4895ef;--text:#d8e0ef;--text2:#6b7a94;--text3:#38455a;--glow-green:rgba(0,229,160,0.12);--glow-red:rgba(255,77,109,0.12);--glow-yellow:rgba(255,190,11,0.12)}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(72,149,239,.05) 0%,transparent 70%);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;-webkit-overflow-scrolling:touch}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.3}
#hdr{position:fixed;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(5,7,9,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:100;animation:fadeIn .3s ease forwards}
.hdr-left{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--accent-green);letter-spacing:.15em}
.hdr-center{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2)}
.hdr-right{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:pulse 2s ease-in-out infinite}
.live-badge{font-size:10px;font-weight:600;color:var(--accent-green);letter-spacing:.1em}
.session-pill{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:.08em;border:1px solid currentColor}
.sp-open{color:var(--accent-green);background:rgba(0,229,160,.08)}
.sp-pre{color:var(--accent-yellow);background:rgba(255,190,11,.08)}
.sp-ah{color:var(--accent-blue);background:rgba(72,149,239,.08)}
.sp-closed{color:var(--text3);background:rgba(56,69,90,.08);border-color:var(--text3)}
.page-scroll{margin-top:48px;position:relative;z-index:1}
.date-strip{display:flex;overflow-x:auto;padding:10px 16px 0;gap:20px;border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.date-strip::-webkit-scrollbar{display:none}
.date-tab{padding:6px 2px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;user-select:none}
.date-tab.active{color:var(--text);border-bottom-color:var(--accent-green)}
.date-dot{width:4px;height:4px;border-radius:50%;background:var(--accent-green);opacity:.75;flex-shrink:0}
.main-nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.main-nav::-webkit-scrollbar{display:none}
.nav-tab{padding:12px 13px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:.13em;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;min-height:44px;user-select:none}
.nav-tab.active{color:var(--text);border-bottom-color:var(--accent-green)}
.panel{padding:16px;animation:fadeIn .2s ease forwards}
.panel.hidden{display:none}
.summary-bar{display:flex;overflow-x:auto;gap:8px;padding-bottom:14px;margin-bottom:16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;animation:slideUp .3s ease .15s both}
.summary-bar::-webkit-scrollbar{display:none}
.stat-pill{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;min-width:68px}
.stat-pill .val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;line-height:1;display:block}
.stat-pill .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);display:block;margin-top:4px}
.val-g{color:var(--accent-green)}.val-r{color:var(--accent-red)}.val-y{color:var(--accent-yellow)}.val-w{color:var(--text)}
.cards-list{display:flex;flex-direction:column;gap:10px}
.ticker-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;border-left:3px solid transparent;opacity:0;transform:translateY(20px);animation:cardIn .4s ease forwards;cursor:pointer;transition:box-shadow .3s ease,border-color .3s ease}
.ticker-card.v-strong{border-left-color:var(--accent-green);box-shadow:-4px 0 20px var(--glow-green)}
.ticker-card.v-weak{border-left-color:var(--accent-yellow);box-shadow:-4px 0 20px var(--glow-yellow)}
.ticker-card.v-avoid{border-left-color:var(--accent-red);box-shadow:-4px 0 20px var(--glow-red)}
@keyframes glowG{0%,100%{box-shadow:-4px 0 22px rgba(0,229,160,.18),0 2px 24px rgba(0,229,160,.08)}50%{box-shadow:-4px 0 36px rgba(0,229,160,.42),0 2px 30px rgba(0,229,160,.16)}}
@keyframes glowR{0%,100%{box-shadow:-4px 0 22px rgba(255,77,109,.18),0 2px 24px rgba(255,77,109,.08)}50%{box-shadow:-4px 0 36px rgba(255,77,109,.42),0 2px 30px rgba(255,77,109,.16)}}
.ticker-card[data-dir="LONG"]:hover{animation:glowG 2.5s ease-in-out infinite!important}
.ticker-card[data-dir="SHORT"]:hover{animation:glowR 2.5s ease-in-out infinite!important}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px}
.card-ticker{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;line-height:1;min-width:80px}
.t-strong{color:var(--accent-green)}.t-weak{color:var(--accent-yellow)}.t-avoid{color:var(--accent-red)}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;flex:1;padding:0 8px;align-items:center}
.badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:3px 7px;border-radius:4px;letter-spacing:.06em}
.b-strong{background:rgba(0,229,160,.12);color:var(--accent-green);border:1px solid rgba(0,229,160,.25)}
.b-weak{background:rgba(255,190,11,.12);color:var(--accent-yellow);border:1px solid rgba(255,190,11,.25)}
.b-avoid{background:rgba(255,77,109,.12);color:var(--accent-red);border:1px solid rgba(255,77,109,.25)}
.b-long{background:rgba(0,229,160,.06);color:var(--accent-green);border:1px solid rgba(0,229,160,.18)}
.b-short{background:rgba(255,77,109,.06);color:var(--accent-red);border:1px solid rgba(255,77,109,.18)}
.b-rsi-bull{background:rgba(0,229,160,.16);color:var(--accent-green);border:1px solid rgba(0,229,160,.32);font-size:8px;padding:2px 5px}
.b-rsi-bear{background:rgba(255,77,109,.16);color:var(--accent-red);border:1px solid rgba(255,77,109,.32);font-size:8px;padding:2px 5px}
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.conviction{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)}
.chevron{color:var(--text3);font-size:14px;transition:transform .3s ease;display:inline-block;line-height:1}
.ticker-card.open .chevron{transform:rotate(180deg)}
.price-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:0 14px 10px;gap:4px}
.price-cell{text-align:center}
.p-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);display:block;margin-bottom:4px}
.p-value{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;line-height:1;display:block}
.p-entry{color:var(--text)}.p-stop{color:var(--accent-red)}.p-target{color:var(--accent-green)}
.live-strip{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:6px;min-height:44px}
.live-price{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:var(--text)}
.price-delta{font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;align-items:center;gap:3px}
.d-up{color:var(--accent-green)}.d-down{color:var(--accent-red)}
.strip-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.days-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.status-badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:3px 7px;border-radius:4px;letter-spacing:.04em}
.s-open{background:rgba(72,149,239,.12);color:var(--accent-blue);border:1px solid rgba(72,149,239,.25)}
.s-inplay{background:rgba(255,190,11,.12);color:var(--accent-yellow);border:1px solid rgba(255,190,11,.25)}
.s-hit{background:rgba(0,229,160,.12);color:var(--accent-green);border:1px solid rgba(0,229,160,.25);animation:shimmer 3s ease infinite}
.s-stopped{background:rgba(255,77,109,.12);color:var(--accent-red);border:1px solid rgba(255,77,109,.25)}
.s-expired{background:rgba(74,85,104,.2);color:var(--text3);border:1px solid var(--border)}
.prog-wrap{padding:8px 14px 6px}
.prog-track{position:relative;height:6px;background:var(--border);border-radius:3px}
.prog-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;width:0;transition:width .6s ease .4s}
.pf-green{background:linear-gradient(90deg,rgba(0,229,160,.2),var(--accent-green))}
.pf-red{background:linear-gradient(90deg,rgba(255,77,109,.2),var(--accent-red))}
.prog-entry{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--text3);border-radius:1px;transform:translateX(-50%)}
.prog-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);transition:left .6s ease .4s}
.dot-g{background:var(--accent-green);box-shadow:0 0 8px rgba(0,229,160,.6)}
.dot-r{background:var(--accent-red);box-shadow:0 0 8px rgba(255,77,109,.6)}
.prog-price-row{position:relative;height:18px;margin-top:4px}
.prog-price-lbl{position:absolute;transform:translateX(-50%);top:0;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--text);background:var(--surface2);border:1px solid var(--border2);border-radius:3px;padding:1px 5px;white-space:nowrap;pointer-events:none;transition:left .6s ease .4s}
.prog-labels{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px;padding-bottom:2px}
.pnl-row{padding:4px 14px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)}
.pnl-v{font-weight:600}.pnl-g{color:var(--accent-green)}.pnl-r{color:var(--accent-red)}
.metrics-wrap{max-height:0;overflow:hidden;transition:max-height .35s ease-out;border-top:1px solid transparent}
.ticker-card.open .metrics-wrap{max-height:900px;border-top-color:var(--border)}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px 14px 6px}
.metric-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.chip-key{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);display:block;margin-bottom:4px}
.chip-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;display:block;line-height:1.3}
.cv-bull{color:var(--accent-green)}.cv-bear{color:var(--accent-red)}.cv-neut{color:var(--text2)}.cv-warn{color:var(--accent-yellow)}
.rr-wrap{padding:2px 14px 8px;display:flex;align-items:center;gap:12px}
.rr-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);white-space:nowrap}
.rr-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--accent-green);min-width:36px}
.rr-track{flex:1;height:4px;background:var(--border);border-radius:2px;max-width:120px}
.rr-fill{height:100%;background:linear-gradient(90deg,var(--accent-red),var(--accent-green));border-radius:2px;transition:width .6s ease .6s}
.copy-btn{display:block;margin:4px 14px 12px;width:calc(100% - 28px);background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:7px 14px;border-radius:5px;cursor:pointer;letter-spacing:.08em;transition:color .15s,border-color .15s,background .15s;text-align:center}
.copy-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue);background:rgba(72,149,239,.06)}
.copy-btn.copied{border-color:var(--accent-green)!important;color:var(--accent-green)!important;background:rgba(0,229,160,.06)!important}
.perf-section{margin-bottom:20px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.12em;color:var(--text2);text-transform:uppercase;margin-bottom:10px}
.headline-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.hl-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.hl-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;line-height:1;display:block}
.hl-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);display:block;margin-top:6px}
.source-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.src-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border)}
.src-row:last-child{border-bottom:none}
.src-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;min-width:110px;color:var(--text)}
.src-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);flex:1}
.src-bar-wrap{width:70px;height:3px;background:var(--border);border-radius:2px}
.src-bar-fill{height:100%;border-radius:2px}
.src-wr{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;min-width:34px;text-align:right}
.bw-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.bw-card{border-radius:12px;padding:14px;border:1px solid}
.bw-best{background:var(--glow-green);border-color:rgba(0,229,160,.25)}
.bw-worst{background:var(--glow-red);border-color:rgba(255,77,109,.25)}
.bw-ticker{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;display:block}
.bw-pnl{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;display:block;margin-top:4px}
.bw-detail{font-size:10px;color:var(--text2);display:block;margin-top:4px}
.sa-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.sa-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:52px;color:var(--accent-green);display:block;line-height:1}
.sa-sub{font-size:11px;color:var(--text2);display:block;margin-top:8px}
.trades-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
table.at{width:100%;border-collapse:collapse;font-size:11px}
table.at th{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
table.at td{padding:9px 12px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;white-space:nowrap;vertical-align:middle}
table.at tr:last-child td{border-bottom:none}
table.at tbody tr:hover{background:var(--surface2);cursor:pointer}
.streak-pill{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:.06em;display:inline-block}
.streak-win{background:rgba(0,229,160,.12);color:var(--accent-green);border:1px solid rgba(0,229,160,.25)}
.streak-loss{background:rgba(255,77,109,.12);color:var(--accent-red);border:1px solid rgba(255,77,109,.25)}
.streak-none{background:rgba(74,85,104,.15);color:var(--text3);border:1px solid var(--border)}
.sig-filter{display:flex;gap:8px;margin-bottom:12px}
.sfbtn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:.1em;padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;min-height:36px}
.sfbtn.sf-all{border-color:var(--accent-blue);color:var(--accent-blue);background:rgba(72,149,239,.08)}
.sfbtn.sf-buy{border-color:var(--accent-green);color:var(--accent-green);background:rgba(0,229,160,.08)}
.sfbtn.sf-sell{border-color:var(--accent-red);color:var(--accent-red);background:rgba(255,77,109,.08)}
.sig-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;margin-bottom:12px}
table.st{width:100%;border-collapse:collapse}
table.st th{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border);text-align:left}
table.st td{padding:11px 14px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
table.st tr:last-child td{border-bottom:none}
.sc-buy{color:var(--accent-green)}.sc-sell{color:var(--accent-red)}.sc-watch{color:var(--accent-yellow)}
.scan-note{font-size:10px;color:var(--text3);padding:6px 0;font-family:'JetBrains Mono',monospace}
.rsi-empty{padding:36px 16px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);line-height:2.2}
.rsi-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);padding:0 0 12px;display:flex;gap:14px;flex-wrap:wrap}
.rsi-meta b{color:var(--text2);font-weight:600}
.week-hdr{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.week-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--text);display:block;margin-bottom:12px}
.week-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ws .ws-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;color:var(--accent-green);display:block}
.ws .ws-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);display:block;margin-top:2px}
.day-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.day-date{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;color:var(--text2);min-width:65px;line-height:1.4;white-space:pre-line}
.day-tickers{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:5px;line-height:1.6}
.day-badges{display:flex;gap:4px;flex-wrap:wrap}
.week-best{background:var(--glow-green);border:1px solid rgba(0,229,160,.25);border-radius:12px;padding:16px;margin-bottom:16px}
.wb-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:.12em;color:var(--accent-green);text-transform:uppercase;display:block;margin-bottom:6px}
.wb-ticker{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;color:var(--accent-green);display:block}
.wb-pnl{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--accent-green);display:block;margin-top:4px}
.wb-detail{font-size:11px;color:var(--text2);display:block;margin-top:4px}
.pattern-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.pt-title{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;color:var(--text2);letter-spacing:.08em;display:block;margin-bottom:10px;text-transform:uppercase}

function fmt(n,d=2){return n==null?'—':Number(n).toFixed(d)}
function fmtP(n){if(n==null)return'—';return'$'+Number(n).toFixed(2)}
function fmtDelta(c,p){
  if(c==null)return'';
  const arr=c>=0?'▲':'▼';
  const cls=c>=0?'d-up':'d-down';
  return`<span class="${cls}">${arr} ${c>=0?'+':''}${Number(c).toFixed(2)} (${p>=0?'+':''}${Number(p).toFixed(2)}%)</span>`;
}
function statusBadge(s){
  const m={'IN PLAY':'<span class="status-badge s-inplay">IN PLAY</span>','OPEN':'<span class="status-badge s-open">OPEN</span>','HIT TARGET':'<span class="status-badge s-hit">✅ HIT TARGET</span>','STOPPED OUT':'<span class="status-badge s-stopped">❌ STOPPED</span>','EXPIRED':'<span class="status-badge s-expired">EXPIRED</span>'};
  return m[s]||`<span class="status-badge s-open">${s}</span>`;
}
function vBadge(v){const m={STRONG:'<span class="badge b-strong">STRONG</span>',WEAK:'<span class="badge b-weak">WEAK</span>',AVOID:'<span class="badge b-avoid">AVOID</span>'};return m[v]||'';}
function dBadge(d){return d==='LONG'?'<span class="badge b-long">▲ LONG</span>':'<span class="badge b-short">▼ SHORT</span>';}
function vClass(v){return v==='STRONG'?'v-strong':v==='WEAK'?'v-weak':'v-avoid'}
function tClass(v){return v==='STRONG'?'t-strong':v==='WEAK'?'t-weak':'t-avoid'}

function getMarketSession(){
  try{
    const et=new Date().toLocaleString('en-US',{timeZone:'America/New_York',hour12:false,hour:'2-digit',minute:'2-digit'});
    const parts=et.split(':');
    const h=parseInt(parts[0]),m=parseInt(parts[1]);
    const mins=h*60+m;
    if(mins>=4*60&&mins<9*60+30)return{label:'PRE-MARKET',cls:'sp-pre'};
    if(mins>=9*60+30&&mins<16*60)return{label:'MARKET OPEN',cls:'sp-open'};
    if(mins>=16*60&&mins<20*60)return{label:'AFTER HOURS',cls:'sp-ah'};
    return{label:'CLOSED',cls:'sp-closed'};
  }catch(e){return{label:'',cls:'sp-closed'};}
}

function hasStrongSignals(dayKey){
  const d=ALL_DAYS_DATA.days[dayKey];
  return d&&d.tickers.some(t=>t.verdict==='STRONG');
}

function getRsiBadge(ticker){
  if(!RSI_SCAN_DATA||!RSI_SCAN_DATA.results)return'';
  const r=RSI_SCAN_DATA.results.find(x=>x.ticker===ticker);
  if(!r)return'';
  return r.signal==='BULLISH'
    ?'<span class="badge b-rsi-bull">RSI ▲ BB</span>'
    :'<span class="badge b-rsi-bear">RSI ▼ BB</span>';
}

function calcStreak(){
  const allT=[];
  DAYS_ORDER.forEach(k=>ALL_DAYS_DATA.days[k].tickers.forEach(t=>allT.push(t)));
  const closed=allT.filter(t=>t.status==='HIT TARGET'||t.status==='STOPPED OUT');
  if(!closed.length)return null;
  const dir=closed[closed.length-1].status==='HIT TARGET'?1:-1;
  let n=0;
  for(let i=closed.length-1;i>=0;i--){
    const r=closed[i].status==='HIT TARGET'?1:-1;
    if(r===dir)n+=dir;else break;
  }
  return n;
}

function copyTradeText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✓ Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='⎘ Copy Trade';btn.classList.remove('copied');},1600);
  }).catch(()=>{btn.textContent='Copy failed';setTimeout(()=>{btn.textContent='⎘ Copy Trade';},1600);});
}
function copyTrade(ticker,dir,entry,stop,target,conviction,e){
  e.stopPropagation();
  const t=`${ticker} | ${dir} | Entry $${Number(entry).toFixed(2)} | Stop $${Number(stop).toFixed(2)} | Target $${Number(target).toFixed(2)} | Conviction ${conviction}`;
  copyTradeText(t,e.currentTarget);
}

function buildBar(t){
  const{entry,stop,target,direction,currentPrice,status}=t;
  if(status==='HIT TARGET'){
    return`<div class="prog-wrap"><div class="prog-track"><div class="prog-fill pf-green" style="width:100%"></div><div class="prog-dot dot-g" style="left:100%"></div></div><div class="prog-labels"><span style="color:var(--accent-red)">${fmtP(stop)}</span><span>ENTRY ${fmtP(entry)}</span><span style="color:var(--accent-green)">${fmtP(target)}</span></div></div>`;
  }
  if(status==='STOPPED OUT'){
    return`<div class="prog-wrap"><div class="prog-track"><div class="prog-fill pf-red" style="width:100%"></div><div class="prog-dot dot-r" style="left:0%"></div></div><div class="prog-labels"><span style="color:var(--accent-red)">${fmtP(stop)}</span><span>ENTRY ${fmtP(entry)}</span><span style="color:var(--accent-green)">${fmtP(target)}</span></div></div>`;
  }
  let dotPos,entryPos;
  if(direction==='LONG'){
    const range=target-stop;
    dotPos=Math.min(Math.max((currentPrice-stop)/range,0),1);
    entryPos=(entry-stop)/range;
  }else{
    const range=stop-target;
    dotPos=Math.min(Math.max((stop-currentPrice)/range,0),1);
    entryPos=(stop-entry)/range;
  }
  const gaining=(direction==='LONG')?(currentPrice>=entry):(currentPrice<=entry);
  const fp=(dotPos*100).toFixed(1);
  const ep=(entryPos*100).toFixed(1);
  return`<div class="prog-wrap"><div class="prog-track"><div class="prog-fill ${gaining?'pf-green':'pf-red'}" style="width:${fp}%"></div><div class="prog-entry" style="left:${ep}%"></div><div class="prog-dot ${gaining?'dot-g':'dot-r'}" style="left:${fp}%"></div></div><div class="prog-price-row"><span class="prog-price-lbl" style="left:${fp}%">${fmtP(currentPrice)}</span></div><div class="prog-labels"><span style="color:var(--accent-red)">${fmtP(stop)}</span><span style="color:var(--text3)">ENTRY ${fmtP(entry)}</span><span style="color:var(--accent-green)">${fmtP(target)}</span></div></div>`;
}

function buildCard(t,i,autoOpen){
  const vc=vClass(t.verdict),tc=tClass(t.verdict);
  const oc=autoOpen?' open':'';
  const chips=t.metrics.map(m=>`<div class="metric-chip"><span class="chip-key">${m.key}</span><span class="chip-val cv-${m.type}">${m.value}</span></div>`).join('');
  const rrFill=Math.min((t.rrRatio/5)*100,100);
  const gc=t.pnlDollar>=0?'pnl-g':'pnl-r';
  const sign=t.pnlDollar>=0?'+':'';
  const dayLbl=t.daysOpen===0?'Today':`${t.daysOpen}d open`;
  const rsiBadge=getRsiBadge(t.ticker);
  const eTk=t.ticker.replace(/'/g,"\\'");
  const eCv=t.conviction.replace(/'/g,"\\'");
  return`<div class="ticker-card ${vc}${oc}" data-dir="${t.direction}" style="animation-delay:${300+i*55}ms" onclick="toggleCard(this)">
<div class="card-header"><span class="card-ticker ${tc}">${t.ticker}</span><div class="card-badges">${vBadge(t.verdict)}${dBadge(t.direction)}${rsiBadge}</div><div class="card-right"><span class="conviction">${t.conviction}</span><span class="chevron">▾</span></div></div>
<div class="price-row"><div class="price-cell"><span class="p-label">Entry</span><span class="p-value p-entry">${fmtP(t.entry)}</span></div><div class="price-cell"><span class="p-label">Stop</span><span class="p-value p-stop">${fmtP(t.stop)}</span></div><div class="price-cell"><span class="p-label">Target</span><span class="p-value p-target">${fmtP(t.target)}</span></div></div>
<div class="live-strip"><div><span class="live-price">${fmtP(t.currentPrice)}</span> <span class="price-delta">${fmtDelta(t.priceChange,t.priceChangePct)}</span></div><div class="strip-right"><span class="days-lbl">${dayLbl}</span>${statusBadge(t.status)}</div></div>
${buildBar(t)}
<div class="pnl-row">If entered at ${fmtP(t.entry)}: <span class="pnl-v ${gc}">${sign}${fmtP(t.pnlDollar)} (${sign}${fmt(t.pnlPct)}%)</span></div>
<div class="metrics-wrap"><div class="metrics-grid">${chips}</div><div class="rr-wrap"><span class="rr-label">R:R</span><span class="rr-val">1 : ${fmt(t.rrRatio,1)}</span><div class="rr-track"><div class="rr-fill" style="width:${rrFill}%"></div></div></div><button class="copy-btn" onclick="copyTrade('${eTk}','${t.direction}',${t.entry},${t.stop},${t.target},'${eCv}',event)">⎘ Copy Trade</button></div>

function buildEzpzCard(r,i){
  const isLong=r.direction==='LONG';
  const dc=isLong?'long':'short';
  const dirBadge=isLong?'<span class="badge b-long">▲ LONG</span>':'<span class="badge b-short">▼ SHORT</span>';
  const bulls=(r.signals||[]).filter(s=>s.score==='BULLISH').length;
  const bears=(r.signals||[]).filter(s=>s.score==='BEARISH').length;
  const neuts=(r.signals||[]).filter(s=>s.score==='NEUTRAL').length;
  const cauts=(r.signals||[]).filter(s=>s.score==='CAUTION').length;
  const total=bulls+bears+neuts+cauts||1;
  const bPct=(bulls/total*100).toFixed(1);
  const nPct=((neuts+cauts)/total*100).toFixed(1);
  const rPct=(bears/total*100).toFixed(1);
  const sigRows=(r.signals||[]).map(s=>{
    const sc=s.score==='BULLISH'?'ss-bull':s.score==='BEARISH'?'ss-bear':s.score==='CAUTION'?'ss-caut':'ss-neut';
    const sl=s.score==='BULLISH'?'BULL':s.score==='BEARISH'?'BEAR':s.score==='CAUTION'?'CAUT':'NEUT';
    const rc=s.score==='BULLISH'?'row-bull':s.score==='BEARISH'?'row-bear':s.score==='CAUTION'?'row-caut':'';
    return`<tr class="${rc}"><td><span class="sig-name">${s.signal}</span><span class="sig-src-lbl">${s.source}</span></td><td style="padding-right:8px"><span class="ss ${sc}">${sl}</span></td><td><span class="sig-detail-cell">${s.detail}</span></td></tr>`;
  }).join('');
  const entryFmt=r.entry!=null?fmtP(r.entry):'—';
  const stopFmt=r.stop!=null?fmtP(r.stop):'—';
  const targetFmt=r.target!=null?fmtP(r.target):'—';
  const eTk2=r.ticker.replace(/'/g,"\\'");
  const eCv2=r.conviction.replace(/'/g,"\\'");
  return`<div class="ez-card dir-${dc}" onclick="toggleEzCard(this)">
<div class="ez-card-top">
  <span class="ez-ticker-lg ${dc}">${r.ticker}</span>
  <div class="ez-top-mid">${dirBadge}</div>
  <div class="ez-top-right">
    <span class="ez-date-lbl">${r.displayDate||r.analysedAt}</span>
    <span class="ez-conv-lbl">${r.conviction}</span>
  </div>
  <span class="ez-card-chevron">▾</span>
</div>
<div class="ez-card-levels">
  <div class="ez-lvl"><span class="ez-lvl-lbl">Entry</span><span class="ez-lvl-val lv-entry">${entryFmt}</span></div>
  <div class="ez-lvl"><span class="ez-lvl-lbl">Stop</span><span class="ez-lvl-val lv-stop">${stopFmt}</span></div>
  <div class="ez-lvl"><span class="ez-lvl-lbl">Target</span><span class="ez-lvl-val lv-target">${targetFmt}</span></div>
</div>
<div class="ez-conv-bar-wrap">
  <div class="ez-conv-bar">
    <div class="ez-conv-seg-bull" style="width:${bPct}%"></div>
    <div class="ez-conv-seg-neut" style="width:${nPct}%"></div>
    <div class="ez-conv-seg-bear" style="width:${rPct}%"></div>
  </div>
  <div class="ez-conv-legend">
    <span style="color:var(--accent-green)">${bulls} bull</span>
    <span style="color:var(--text3)">${neuts+cauts} neut/caut</span>
    <span style="color:var(--accent-red)">${bears} bear</span>
  </div>
</div>
<div class="ez-card-footer">
  ${r.earnings?`<span class="ez-earnings">${r.earnings}</span>`:'<span></span>'}
  ${r.price?`<span class="ez-price-tag">Last ${fmtP(r.price)}</span>`:''}
</div>
<div class="ez-expand">
  <div class="signal-tbl-wrap">
    <table class="signal-tbl">
      <thead><tr><th>Signal</th><th>Score</th><th>Detail</th></tr></thead>
      <tbody>${sigRows||'<tr><td colspan="3" class="ez-no-data">No signals recorded</td></tr>'}</tbody>
    </table>
  </div>
  ${r.biasNote?`<div class="ez-bias">${r.biasNote}</div>`:''}
  <button class="copy-btn" onclick="copyTrade('${eTk2}','${r.direction}',${r.entry},${r.stop},${r.target},'${eCv2}',event)">⎘ Copy Trade</button>
</div>
</div>`;

function renderSignals(){
  const el=document.getElementById('tab-signals');
  const day=ALL_DAYS_DATA.days[currentDayKey];
  if(!day){el.innerHTML='<p style="color:var(--text3);font-family:\'JetBrains Mono\',monospace;padding:20px 0">No signals for this day.</p>';return;}
  const pm={};
  day.tickers.forEach(t=>pm[t.ticker]={price:t.currentPrice,change:t.priceChange,pct:t.priceChangePct});
  const filtered=day.signals.filter(s=>{
    if(signalFilter==='ALL')return true;
    if(signalFilter==='BUY')return s.signal==='BUY';
    if(signalFilter==='SELL')return s.signal==='SELL';
    return true;
  });
  const rows=filtered.map(s=>{
    const p=pm[s.ticker]||{};
    const sc=s.signal==='BUY'?'sc-buy':s.signal==='SELL'?'sc-sell':'sc-watch';
    return`<tr><td>${s.ticker}</td><td class="${sc}">${s.signal}</td><td style="color:var(--text2);font-size:10px">${s.source}</td><td>${p.price?fmtP(p.price):'—'}</td><td>${p.change!=null?fmtDelta(p.change,p.pct):'—'}</td></tr>`;
  }).join('');
  const allCls=signalFilter==='ALL'?' sf-all':'';
  const buyCls=signalFilter==='BUY'?' sf-buy':'';

  el.innerHTML=`

  <button class="sfbtn${allCls}" onclick="setSignalFilter('ALL')">ALL</button>
  <button class="sfbtn${buyCls}" onclick="setSignalFilter('BUY')">BUY</button>

}

<div class="pt-item"><span>Avg R:R across all setups</span><span class="pt-val" style="color:var(--accent-green)">${avgRR}</span></div>
${worst?`<div class="pt-item"><span>Worst open — ${worst.ticker} ${worst.direction}</span><span class="pt-val" style="color:var(--accent-red)">${worst.pnlPct>=0?'+':''}${fmt(worst.pnlPct)}%</span></div>`:''}
${best&&best!==worst?`<div class="pt-item"><span>Best open — ${best.ticker} ${best.direction}</span><span class="pt-val" style="color:var(--accent-green)">+${fmt(best.pnlPct)}%</span></div>`:''}
</div>`;
}

function switchDay(k){
  currentDayKey=k;
  localStorage.setItem('oliver_day',k);
  renderDateStrip();
  const d=ALL_DAYS_DATA.days[k];
  if(d)document.getElementById('hdr-date').textContent=d.date;
  if(currentNavTab==='setups')renderSetups();
  else if(currentNavTab==='signals')renderSignals();
}

function switchNav(id){
  currentNavTab=id;
  localStorage.setItem('oliver_nav',id);
  ALL_TAB_IDS.forEach(x=>document.getElementById('tab-'+x).classList.toggle('hidden',x!==id));
  renderNav();
  if(id==='setups')renderSetups();
  else if(id==='perf')renderPerf();
  else if(id==='signals')renderSignals();
  else if(id==='rsiscan')renderRsiScan();
  else if(id==='week')renderWeek();
  else if(id==='ezpz')renderEzpz();
  else if(id==='playbook')renderPlaybook();
}

function updateClock(){
  const now=new Date();
  document.getElementById('hdr-time').textContent=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const sess=getMarketSession();
  const sp=document.getElementById('session-pill');
  if(sp){sp.textContent=sess.label;sp.className='session-pill '+sess.cls;}
}

function init(){
  const savedDay=localStorage.getItem('oliver_day');
  const savedNav=localStorage.getItem('oliver_nav');
  if(savedDay&&ALL_DAYS_DATA.days[savedDay])currentDayKey=savedDay;
  if(savedNav&&ALL_TAB_IDS.includes(savedNav))currentNavTab=savedNav;
  updateClock();
  const d=ALL_DAYS_DATA.days[currentDayKey];
  if(d)document.getElementById('hdr-date').textContent=d.date;
  renderDateStrip();
  renderNav();
  ALL_TAB_IDS.forEach(x=>document.getElementById('tab-'+x).classList.toggle('hidden',x!==currentNavTab));
  if(currentNavTab==='setups')renderSetups();
  else if(currentNavTab==='perf')renderPerf();
  else if(currentNavTab==='signals')renderSignals();
  else if(currentNavTab==='rsiscan')renderRsiScan();
  else if(currentNavTab==='week')renderWeek();
  else if(currentNavTab==='ezpz')renderEzpz();
  else if(currentNavTab==='playbook')renderPlaybook();
  setInterval(updateClock,30000);
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
